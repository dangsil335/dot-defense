  const ALL_ABILITY_IDS = Object.keys(ABILITY_DEFS);
  const BASIC_ABILITY_IDS = ALL_ABILITY_IDS.filter(id => !ABILITY_DEFS[id].isCombo);

  // ===== 조합 레시피 =====
  // 두 기본 능력을 동시에 보유하면 자동으로 조합 능력으로 합쳐짐.
  const COMBO_RECIPES = [
    { parts: ['scatter',   'mortar'],    combo: 'shotgunBurst' },
    { parts: ['shot',      'multi'],     combo: 'precisionBurst' },
    { parts: ['chain',     'thunder'],   combo: 'chainStorm' },
    { parts: ['nova',      'frost'],     combo: 'frostNova' },
    { parts: ['laser',     'beam'],      combo: 'twinBeam' },
    { parts: ['orbital',   'tornado'],   combo: 'stormOrbit' },
    { parts: ['boomerang', 'sniper'],    combo: 'steelBoomerang' },
    { parts: ['turret',    'missile'],   combo: 'missileTurret' },
    { parts: ['fire',      'iceLance'],  combo: 'frostfireSpear' },
    { parts: ['mine',      'drone'],     combo: 'kamikazeDrone' },
    { parts: ['meteor',    'blackhole'], combo: 'cosmicCollapse' },
    { parts: ['sword',     'starfall'],  combo: 'swordRain' },
  ];
  // 어떤 기본 능력 → 어떤 조합의 부품인지 미리 인덱싱 (UI 힌트용)
  const COMBO_PARTNER = {};
  for (const r of COMBO_RECIPES) {
    COMBO_PARTNER[r.parts[0]] = { partner: r.parts[1], combo: r.combo };
    COMBO_PARTNER[r.parts[1]] = { partner: r.parts[0], combo: r.combo };
  }

  function checkCombos() {
    for (const recipe of COMBO_RECIPES) {
      const i1 = state.tower.abilities.findIndex(a => a.id === recipe.parts[0]);
      const i2 = state.tower.abilities.findIndex(a => a.id === recipe.parts[1]);
      if (i1 === -1 || i2 === -1) continue;
      const a1 = state.tower.abilities[i1];
      const a2 = state.tower.abilities[i2];
      const newLevel = Math.max(a1.level, a2.level);
      // 큰 인덱스부터 제거 (위치 보존)
      state.tower.abilities.splice(Math.max(i1, i2), 1);
      state.tower.abilities.splice(Math.min(i1, i2), 1);
      const newAb = { id: recipe.combo, level: newLevel };
      ABILITY_DEFS[recipe.combo].init(newAb);
      state.tower.abilities.push(newAb);
      // 화면 플래시 + 토스트
      state.comboFlash = 30;
      state.comboFlashColor = ABILITY_DEFS[recipe.combo].color || '#ffaa55';
      // 폭죽 같은 파티클을 타워 주변에 뿌림
      for (let k = 0; k < 30; k++) {
        spawnParticles(CX, CY, state.comboFlashColor, 1);
      }
      toast(`✨ ${ABILITY_DEFS[recipe.combo].name} 조합 완성!`);
      unlockAbility(recipe.combo);  // 도감 해금
      return true;
    }
    return false;
  }

  // ===== 라운드 설정 =====
  // 5라운드마다 보스 라운드: 잡몹 수 절반(10마리, 2초 간격) + 보스 1마리.
  // 일반: 25초간 1초에 1마리씩 (총 20마리). 마지막 5초는 휴식.
  function roundConfig(n) {
    const hp = Math.ceil(3 * Math.pow(1.35, n - 1));
    const isBoss = n > 0 && n % 5 === 0;
    return {
      duration:      25 * FPS,
      spawnCount:    isBoss ? 10 : 20,
      spawnInterval: isBoss ? 2 * FPS : 1 * FPS,
      enemyHp:       hp,
      enemySpeed:    0.008 + (n - 1) * 0.0005,
      enemyGold:     Math.max(1, Math.ceil(hp / 3)),
      isBoss,
      bossHp:        Math.ceil(hp * 12),
      bossGold:      Math.ceil(hp * 4),
    };
  }

  // ===== 게임 상태 =====
  let state, paused;
  function reset() {
    state = {
      tower: {
        abilities: [],     // [{id, level, cooldown, ...각 능력별 상태}]
        acquireCount: 0,   // 랜덤 능력 획득 누적 횟수 (비용 계산용)
      },
      enemies: [],
      bullets: [],
      particles: [],
      comboFlash: 0,
      comboFlashColor: '#ffaa55',
      round: 1,
      roundFrame: 0,        // 현재 라운드 경과 프레임
      spawnPlan: [],        // 이번 라운드에 남은 스폰 시점
      gold: 0,
      score: 0,
      gameOver: false,
      gameOverReason: '',
      t: 0,
    };
    planRound();
    paused = false;
  }

  function planRound() {
    const cfg = roundConfig(state.round);
    state.roundFrame = 0;
    state.spawnPlan = [];
    for (let i = 0; i < cfg.spawnCount; i++) {
      state.spawnPlan.push((i + 1) * cfg.spawnInterval);
    }
    // 보스 라운드: 1초 후 보스 등장 예약
    state.bossSpawnAt = cfg.isBoss ? 60 : -1;
  }

  // ===== 능력용 헬퍼 =====
  function findNearestEnemy(range) {
    let target = null, best = Infinity;
    const r2 = range * range;
    for (const e of state.enemies) {
      if (e.hp <= 0) continue;
      const [x, y] = enemyXY(e);
      const d2 = (x-CX)*(x-CX) + (y-CY)*(y-CY);
      if (d2 < r2 && d2 < best) { best = d2; target = e; }
    }
    return target;
  }
  function findFarthestEnemy(range) {
    let target = null, best = -1;
    const r2 = range * range;
    for (const e of state.enemies) {
      if (e.hp <= 0) continue;
      const [x, y] = enemyXY(e);
      const d2 = (x-CX)*(x-CX) + (y-CY)*(y-CY);
      if (d2 < r2 && d2 > best) { best = d2; target = e; }
    }
    return target;
  }
  // target: 유도 대상 (null이면 직진)
  // leader: 리더 탄환 (null이면 일반 탄환). 사이드 탄환은 리더 방향을 추종.
  // offsetAngle: 리더 진행 방향 대비 사이드 탄환의 고정 각도 오프셋
  function fireBullet(angle, dmg, color, target, leader, offsetAngle) {
    const b = {
      x: CX, y: CY,
      vx: Math.cos(angle)*7, vy: Math.sin(angle)*7,
      dmg, life: 100, color,
      target: target || null,
      leader: leader || null,
      offsetAngle: offsetAngle || 0,
    };
    state.bullets.push(b);
    return b;
  }
  function damageEnemy(e, dmg) {
    if (e.hp <= 0) return;
    e.hp -= dmg;
    if (e.hp <= 0) {
      state.gold += e.goldDrop;
      state.score += 10 * state.round;
      const [ex, ey] = enemyXY(e);
      spawnParticles(ex, ey, '#ff5b6e', 8);
    }
  }
  function distPointSegmentSq(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const len2 = dx*dx + dy*dy;
    if (len2 === 0) return (px-ax)*(px-ax) + (py-ay)*(py-ay);
    let t = ((px-ax)*dx + (py-ay)*dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const cx = ax + t*dx, cy = ay + t*dy;
    return (px-cx)*(px-cx) + (py-cy)*(py-cy);
  }

  function enhanceCost(ability) {
    const def = ABILITY_DEFS[ability.id];
    return Math.ceil(def.baseCost * (ability.level + 1) * 0.7);
  }

  // 랜덤 능력 획득 비용: 0, 25, 60, 110, 180, 270, ...
  // 첫 획득은 0G, 누적 횟수에 따라 점점 비싸짐
  function randomAcquireCost() {
    const n = state.tower.acquireCount;
    if (n === 0) return 0;
    return 25 + (n - 1) * 25 + (n - 1) * (n - 1) * 10;
  }

  // ===== 액션 =====
  function actRandomAcquire() {
    if (state.gameOver) return;
    const cost = randomAcquireCost();
    if (state.gold < cost) return toast('골드 부족');
    if (state.tower.abilities.length >= MAX_SLOTS) return toast('슬롯 가득 (삭제 후 가능)');
    const owned = new Set(state.tower.abilities.map(a => a.id));
    // 조합 능력은 풀에서 제외 (오직 합성으로만 획득)
    const pool = BASIC_ABILITY_IDS.filter(id => !owned.has(id));
    if (pool.length === 0) return toast('새 능력 없음');
    const pick = pool[Math.floor(Math.random() * pool.length)];
    const ab = { id: pick, level: 1 };
    ABILITY_DEFS[pick].init(ab);
    state.tower.abilities.push(ab);
    state.gold -= cost;
    state.tower.acquireCount += 1;
    toast(cost === 0 ? `획득: ${ABILITY_DEFS[pick].name} (무료!)` : `획득: ${ABILITY_DEFS[pick].name}`);
    unlockAbility(pick);  // 도감 해금
    checkCombos();  // 조합 가능 즉시 합성
    renderPanel();
  }

  function actEnhance(idx) {
    if (state.gameOver) return;
    const a = state.tower.abilities[idx];
    if (!a) return;
    const cost = enhanceCost(a);
    if (state.gold < cost) return toast('골드 부족');
    state.gold -= cost;
    a.level += 1;
    toast(`${ABILITY_DEFS[a.id].name} Lv${a.level}`);
    renderPanel();
  }

  function actDelete(idx) {
    if (state.gameOver) return;
    const a = state.tower.abilities[idx];
    if (!a) return;
    // 강화에 들인 골드의 40% 환불 (랜덤 획득 비용은 환불 없음)
    let refund = 0;
    for (let lv = 1; lv < a.level; lv++) {
      refund += Math.ceil(enhanceCost({id:a.id, level:lv}) * 0.4);
    }
    state.gold += refund;
    state.tower.abilities.splice(idx, 1);
    toast(refund > 0 ? `삭제 · ${refund}G 환불` : `삭제됨`);
    renderPanel();
  }

  // ===== 적 스폰 =====
  const ENEMY_MIN_R = CORE_R + 40;
  const ENEMY_MAX_R = ARENA_R - 20;
  function spawnEnemy() {
    const cfg = roundConfig(state.round);
    const a = Math.random() * Math.PI * 2;
    const r = ENEMY_MIN_R + Math.random() * (ENEMY_MAX_R - ENEMY_MIN_R);
    const dir = Math.random() < 0.5 ? 1 : -1;
    state.enemies.push({
      angle: a,
      radius: r,
      targetRadius: ENEMY_MIN_R + Math.random() * (ENEMY_MAX_R - ENEMY_MIN_R),
      radiusChangeAt: Math.floor(60 + Math.random()*120),
      angularSpeed: cfg.enemySpeed * dir * (0.5 + Math.random()*0.8),
      hp: cfg.enemyHp,
      maxHp: cfg.enemyHp,
      size: 7,
      goldDrop: cfg.enemyGold,
      slowFrames: 0,
      isBoss: false,
    });
  }
  function spawnBoss() {
    const cfg = roundConfig(state.round);
    const a = Math.random() * Math.PI * 2;
    const r = ENEMY_MAX_R - 30;
    state.enemies.push({
      angle: a,
      radius: r,
      targetRadius: 100 + Math.random() * 150,
      radiusChangeAt: 240,
      angularSpeed: cfg.enemySpeed * (Math.random() < 0.5 ? 1 : -1) * 0.4,
      hp: cfg.bossHp,
      maxHp: cfg.bossHp,
      size: 18,
      goldDrop: cfg.bossGold,
      slowFrames: 0,
      isBoss: true,
    });
  }

  // ===== 업데이트 =====
  function update() {
    if (paused || state.gameOver) return;
    state.t++;

    // 라운드 진행
    const cfg = roundConfig(state.round);
    state.roundFrame++;
    while (state.spawnPlan.length && state.spawnPlan[0] <= state.roundFrame) {
      state.spawnPlan.shift();
      spawnEnemy();
    }
    // 보스 스폰 (예약 시점에 1회)
    if (state.bossSpawnAt > 0 && state.roundFrame >= state.bossSpawnAt) {
      // 이전 보스를 처치하지 못했으면 게임오버
      if (state.enemies.some(e => e.isBoss)) {
        state.gameOver = true;
        state.gameOverReason = '이전 보스를 처치하지 못함';
        renderPanel();
      } else {
        spawnBoss();
      }
      state.bossSpawnAt = -1;
    }
    // 라운드 종료 → 다음 라운드
    if (state.roundFrame >= cfg.duration) {
      state.round++;
      planRound();
    }

    // 게임오버 체크 (적 누적)
    if (state.enemies.length >= MAX_ALIVE) {
      state.gameOver = true;
      state.gameOverReason = `적이 ${MAX_ALIVE}마리를 넘김`;
      renderPanel();
    }

    // 적 이동: 각속도로 회전 + 목표 반경을 향해 천천히 이동
    // 슬로우 효과 적용 (slowFrames > 0 일 때 속도 0.35배)
    for (const e of state.enemies) {
      const slowMul = e.slowFrames > 0 ? 0.35 : 1;
      if (e.slowFrames > 0) e.slowFrames--;
      e.angle += e.angularSpeed * slowMul;
      const dr = e.targetRadius - e.radius;
      if (Math.abs(dr) > 0.2) e.radius += Math.sign(dr) * 0.4 * slowMul;
      e.radiusChangeAt--;
      if (e.radiusChangeAt <= 0) {
        e.targetRadius = ENEMY_MIN_R + Math.random() * (ENEMY_MAX_R - ENEMY_MIN_R);
        e.radiusChangeAt = 90 + Math.floor(Math.random()*150);
      }
    }

    // 능력 tick (각 능력이 독립적으로 작동)
    for (const ab of state.tower.abilities) {
      ABILITY_DEFS[ab.id].tick(ab);
    }

    // 탄환 이동 + (리더 추종 or 약한 유도) + 충돌
    for (const b of state.bullets) {
      // 리더 추종: 사이드 탄환은 리더 진행 방향 + 자기 오프셋 각도로 맞춤
      if (b.leader && b.leader.life > 0) {
        const leaderAng = Math.atan2(b.leader.vy, b.leader.vx);
        const myAng = leaderAng + b.offsetAngle;
        const sp = Math.hypot(b.vx, b.vy);
        b.vx = Math.cos(myAng) * sp;
        b.vy = Math.sin(myAng) * sp;
      }
      // 약한 유도: 타깃이 살아있으면 속도 방향을 살짝 보정
      else if (b.target && b.target.hp > 0) {
        const [tx, ty] = enemyXY(b.target);
        const curAng  = Math.atan2(b.vy, b.vx);
        const wantAng = Math.atan2(ty - b.y, tx - b.x);
        let diff = wantAng - curAng;
        while (diff >  Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const turn = 0.06;
        const c = Math.max(-turn, Math.min(turn, diff));
        const a = curAng + c;
        const sp = Math.hypot(b.vx, b.vy);
        b.vx = Math.cos(a) * sp;
        b.vy = Math.sin(a) * sp;
      }
      b.x += b.vx; b.y += b.vy; b.life--;
      const dx = b.x - CX, dy = b.y - CY;
      if (dx*dx + dy*dy > (ARENA_R+30)*(ARENA_R+30)) b.life = 0;
      for (const e of state.enemies) {
        if (e.hp <= 0) continue;
        const [ex, ey] = enemyXY(e);
        const r = e.size + 2;
        if ((b.x-ex)*(b.x-ex) + (b.y-ey)*(b.y-ey) < r*r) {
          damageEnemy(e, b.dmg);
          spawnParticles(ex, ey, b.color || '#ffd479', 2);
          // 폭발탄: 추가 광역 데미지
          if (b.explodeRadius) {
            for (const e2 of state.enemies) {
              if (e2 === e || e2.hp <= 0) continue;
              const [ex2, ey2] = enemyXY(e2);
              if ((b.x-ex2)*(b.x-ex2) + (b.y-ey2)*(b.y-ey2) < b.explodeRadius * b.explodeRadius) {
                damageEnemy(e2, b.dmg);
                spawnParticles(ex2, ey2, b.color || '#ff8866', 2);
              }
            }
            if (b.explodeAb) b.explodeAb.explosions.push({ x: b.x, y: b.y, r: b.explodeRadius, life: 12 });
          }
          // 슬로우 적용탄
          if (b.slow) e.slowFrames = Math.max(e.slowFrames || 0, b.slow);
          b.life = 0;
          break;
        }
      }
    }

    state.bullets   = state.bullets.filter(b => b.life > 0);
    state.enemies   = state.enemies.filter(e => e.hp > 0);
    for (const p of state.particles) { p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.life--; }
    state.particles = state.particles.filter(p => p.life > 0);
    if (state.comboFlash > 0) state.comboFlash--;

    renderStats();
  }

  // ===== 유틸 =====
  function enemyXY(e){ return [CX + Math.cos(e.angle)*e.radius, CY + Math.sin(e.angle)*e.radius]; }
  function spawnParticles(x, y, color, n=6){
    for (let i=0; i<n; i++){
      const a = Math.random()*Math.PI*2;
      const s = 0.6 + Math.random()*1.6;
      state.particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 18 + Math.random()*10, color });
    }
  }

  // ===== 렌더 =====
  function drawArena() {
    ctx.strokeStyle = '#1d2230';
    ctx.lineWidth = 2;
    for (let r = 60; r <= ARENA_R; r += 40) {
      ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI*2); ctx.stroke();
    }
    ctx.strokeStyle = '#2a3142';
    ctx.beginPath(); ctx.arc(CX, CY, ARENA_R, 0, Math.PI*2); ctx.stroke();
  }
  function drawTower() {
    const pulse = 1 + Math.sin(state.t * 0.08) * 0.15;
    ctx.fillStyle = 'rgba(120, 180, 255, 0.10)';
    ctx.beginPath(); ctx.arc(CX, CY, CORE_R + 10*pulse, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2a3550'; ctx.fillRect(CX-16, CY-16, 32, 32);
    ctx.fillStyle = '#3d5380'; ctx.fillRect(CX-12, CY-12, 24, 24);
    ctx.fillStyle = '#7ad7ff'; ctx.fillRect(CX-4,  CY-4,   8,  8);
  }
  function drawEnemies() {
    for (const e of state.enemies) {
      const [x,y] = enemyXY(e);
      const slow = e.slowFrames > 0;
      if (e.isBoss) {
        // 보스: 큰 크기, 진한 빨강, 펄스 외곽
        const pulse = 1 + Math.sin(state.t * 0.1) * 0.18;
        ctx.fillStyle = slow ? 'rgba(136, 200, 255, 0.18)' : 'rgba(255, 60, 100, 0.18)';
        ctx.beginPath(); ctx.arc(x, y, e.size + 6*pulse, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = slow ? '#3a5570' : '#5a0820';
        ctx.fillRect(x - e.size, y - e.size, e.size*2, e.size*2);
        ctx.fillStyle = slow ? '#7aa8d0' : '#ee2244';
        ctx.fillRect(x - e.size + 2, y - e.size + 2, e.size*2 - 4, e.size*2 - 4);
        ctx.fillStyle = slow ? '#cee0ff' : '#ffaabb';
        ctx.fillRect(x - 4, y - 4, 8, 8);
      } else {
        ctx.fillStyle = slow ? '#5a8ab8' : '#ff5b6e';
        ctx.fillRect(x - e.size, y - e.size, e.size*2, e.size*2);
        ctx.fillStyle = slow ? '#bcd4ee' : '#ffd0d6';
        ctx.fillRect(x - 2, y - 2, 4, 4);
      }
      if (e.hp < e.maxHp) {
        const w = e.size*2;
        ctx.fillStyle = '#3a1418'; ctx.fillRect(x - e.size, y - e.size - 5, w, 2);
        ctx.fillStyle = e.isBoss ? '#ff3355' : '#ff8a98';
        ctx.fillRect(x - e.size, y - e.size - 5, w * (e.hp/e.maxHp), 2);
      }
    }
  }
  function drawBossUI() {
    const boss = state.enemies.find(e => e.isBoss);
    if (!boss) return;
    const w = 320, h = 14;
    const x = (W - w) / 2, y = 16;
    ctx.fillStyle = '#1a0a10'; ctx.fillRect(x - 2, y - 2, w + 4, h + 4);
    ctx.fillStyle = '#ee2244'; ctx.fillRect(x, y, w * (boss.hp / boss.maxHp), h);
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.font = 'bold 11px Consolas, monospace';
    ctx.fillText(`BOSS  ${boss.hp} / ${boss.maxHp}`, W/2, y + 10);
    ctx.textAlign = 'start';
  }
  function drawBullets() {
    for (const b of state.bullets) {
      const s = b.size || 2;
      if (b.glow) {
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = b.color || '#ffe28a';
        ctx.fillRect(b.x - s*2, b.y - s*2, s*4, s*4);
        ctx.globalAlpha = 1;
      }
      ctx.fillStyle = b.color || '#ffe28a';
      ctx.fillRect(b.x - s, b.y - s, s*2, s*2);
      if (s >= 3) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(b.x - 1, b.y - 1, 2, 2);
      }
    }
  }
  function drawAbilities() {
    for (const ab of state.tower.abilities) {
      const def = ABILITY_DEFS[ab.id];
      if (def.draw) def.draw(ab);
    }
  }
  function drawParticles() {
    for (const p of state.particles) {
      ctx.globalAlpha = Math.max(0, p.life / 28);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x-1, p.y-1, 2, 2);
    }
    ctx.globalAlpha = 1;
  }
  function drawComboFlash() {
    if (state.comboFlash <= 0) return;
    const a = state.comboFlash / 30;
    ctx.fillStyle = state.comboFlashColor;
    ctx.globalAlpha = a * 0.5;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
  function drawOverlay() {
    if (paused && !state.gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.font='28px Consolas, monospace';
      ctx.fillText('PAUSED', CX, CY - 10);
      ctx.font='14px Consolas, monospace'; ctx.fillText('Space 로 재개', CX, CY + 20);
      ctx.textAlign='start';
    }
    if (state.gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#ff8a98'; ctx.textAlign='center'; ctx.font='36px Consolas, monospace';
      ctx.fillText('GAME OVER', CX, CY - 40);
      if (state.gameOverReason) {
        ctx.fillStyle = '#ffaaaa'; ctx.font='14px Consolas, monospace';
        ctx.fillText(state.gameOverReason, CX, CY - 12);
      }
      ctx.fillStyle = '#fff'; ctx.font='16px Consolas, monospace';
      ctx.fillText(`도달 라운드: ${state.round}   점수: ${state.score}`, CX, CY + 14);
      ctx.fillText('R 키로 다시 시작', CX, CY + 42);
      ctx.textAlign='start';
    }
  }
  function render() {
    ctx.clearRect(0,0,W,H);
    drawArena();
    drawTower();
    drawEnemies();
    drawAbilities();
    drawBullets();
    drawParticles();
    drawComboFlash();
    drawBossUI();
    drawOverlay();
  }

  // ===== 패널 UI =====
  const $ = id => document.getElementById(id);
  const elRandom = $('randomBtn');
  const elAb     = $('abilities');
  const elToast  = $('toast');

  elRandom.onclick = actRandomAcquire;

  function renderStats() {
    $('s-round').textContent  = state.round;
    const cfg = roundConfig(state.round);
    const remain = Math.max(0, cfg.duration - state.roundFrame) / FPS;
    $('s-time').textContent   = remain.toFixed(1) + 's';
    $('s-timebar').style.width = (100 * (cfg.duration - state.roundFrame) / cfg.duration) + '%';
    $('s-gold').textContent   = state.gold;
    $('s-score').textContent  = state.score;
    $('s-enemies').textContent = `${state.enemies.length} / ${MAX_ALIVE}`;
    const pct = state.enemies.length / MAX_ALIVE;
    const bar = $('s-enemybar');
    bar.style.width = (pct*100) + '%';
    bar.parentElement.classList.toggle('danger', pct > 0.75);
    bar.parentElement.classList.toggle('warn',   pct > 0.5 && pct <= 0.75);
    // 랜덤 버튼 상태
    const owned = new Set(state.tower.abilities.map(a=>a.id));
    const poolLeft = ALL_ABILITY_IDS.filter(id => !owned.has(id)).length;
    const acqCost = randomAcquireCost();
    elRandom.disabled = state.gold < acqCost || state.tower.abilities.length >= MAX_SLOTS || poolLeft === 0;
    elRandom.textContent = acqCost === 0
      ? `🎲 랜덤 능력 획득 (무료)`
      : `🎲 랜덤 능력 획득 (${acqCost}G)`;
  }

  function renderPanel() {
    renderStats();
    elAb.innerHTML = '';
    const abilities = state.tower.abilities;
    for (let i = 0; i < MAX_SLOTS; i++) {
      const a = abilities[i];
      const row = document.createElement('div');
      if (!a) {
        row.className = 'ability-row empty';
        row.textContent = '(빈 슬롯)';
        elAb.appendChild(row);
        continue;
      }
      const def = ABILITY_DEFS[a.id];
      // 조합 힌트: 기본 능력이면 어떤 파트너와 만나면 어떤 조합이 되는지 표시.
      // 조합 능력 자체는 이름을 자기 색으로 칠해서 시각적으로 구분.
      let comboHint = '';
      let nameColor = '#e8eaf0';
      if (def.isCombo) {
        nameColor = def.color;
      } else if (COMBO_PARTNER[a.id]) {
        const p = COMBO_PARTNER[a.id];
        const owned = state.tower.abilities.some(x => x.id === p.partner);
        const partnerName = ABILITY_DEFS[p.partner].name;
        const comboName = ABILITY_DEFS[p.combo].name;
        const color = owned ? '#52e07a' : '#6b7283';
        comboHint = `<small style="color:${color}">+ ${partnerName} → ${comboName}</small>`;
      }
      row.className = 'ability-row';
      row.innerHTML = `
        <div class="ability-name">
          <b style="color:${nameColor}">${def.name} <span style="color:#9bb3ff">Lv${a.level}</span></b>
          <small>${def.desc(a.level)}</small>
          ${comboHint}
        </div>
        <button data-act="up" data-i="${i}">강화<br/><span style="color:#ffd479">${enhanceCost(a)}G</span></button>
        <button data-act="rm" data-i="${i}" title="삭제">✕</button>
      `;
      elAb.appendChild(row);
    }
    elAb.querySelectorAll('button').forEach(btn => {
      btn.onclick = () => {
        const i = +btn.dataset.i;
        if (btn.dataset.act === 'up') actEnhance(i);
        else actDelete(i);
      };
    });
  }

  let toastTimer = 0;
  function toast(msg) {
    elToast.textContent = msg;
    elToast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => elToast.classList.remove('show'), 1200);
  }

  // ===== 배속 =====
  let gameSpeed = 1;
  function setSpeed(s) {
    gameSpeed = s;
    for (const x of [1, 2, 3]) {
      document.getElementById('speed' + x).classList.toggle('active', x === s);
    }
  }
  for (const s of [1, 2, 3]) {
    document.getElementById('speed' + s).onclick = () => setSpeed(s);
  }

  // ===== Pause / Reset 버튼 (모바일에서 키보드 없을 때) =====
  function togglePause() {
    paused = !paused;
    document.getElementById('pauseBtn').textContent = paused ? '▶ 재개' : '⏸ 일시정지';
  }
  document.getElementById('pauseBtn').onclick = togglePause;
  document.getElementById('resetBtn').onclick = () => {
    reset();
    renderPanel();
    document.getElementById('pauseBtn').textContent = '⏸ 일시정지';
  };
  document.getElementById('menuBtn').onclick = () => {
    paused = false;
    document.getElementById('pauseBtn').textContent = '⏸ 일시정지';
    showScreen('menu');
  };

  // ===== 입력 =====
  window.addEventListener('keydown', e => {
    if (e.code === 'Space') { togglePause(); }
    if (e.code === 'KeyR')  { reset(); renderPanel(); document.getElementById('pauseBtn').textContent = '⏸ 일시정지'; }
    if (e.code === 'Digit1') setSpeed(1);
    if (e.code === 'Digit2') setSpeed(2);
    if (e.code === 'Digit3') setSpeed(3);
  });

  // ===== 반응형: 창 크기에 맞춰 전체 UI 스케일 + 가로/세로 자동 전환 =====
  // 캔버스 내부 해상도는 640x640 그대로 (게임 좌표 보존).
  // 동작:
  //  1) 뷰포트 비율로 가로/세로 모드 결정 (#wrap.portrait 토글)
  //  2) transform 해제 후 자연 크기 측정 → 들어맞는 스케일 적용
  //  3) 세로 모드에서는 패널 글자/버튼이 크게 디자인되어 터치 친화적
  const wrapEl = document.getElementById('wrap');
  function fitScale() {
    if (wrapEl.style.display === 'none') return;  // 게임 화면이 숨김이면 패스
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const usePortrait = vh > vw * 1.05;
    wrapEl.classList.toggle('portrait', usePortrait);
    wrapEl.style.transform = 'none';
    const rect = wrapEl.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;
    const pad = 16;
    const scale = Math.min((vw - pad) / rect.width, (vh - pad) / rect.height, 1.8);
    wrapEl.style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', fitScale);
  window.addEventListener('orientationchange', () => setTimeout(fitScale, 100));
  fitScale();
  // 폰트/이미지 로드 후 한 번 더 (자연 크기 안정화)
  setTimeout(fitScale, 50);

  // ===== 서비스워커 (오프라인 / PWA) =====
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  // ===== 도감 해금 (영구 저장) =====
  // 플레이 중 획득한 기본 능력 + 형성된 조합 능력만 도감에서 볼 수 있음.
  const UNLOCKED_KEY = 'dot-defense-unlocked';
  function loadUnlocked() {
    try {
      const raw = localStorage.getItem(UNLOCKED_KEY);
      return new Set(raw ? JSON.parse(raw) : []);
    } catch { return new Set(); }
  }
  function saveUnlocked() {
    try { localStorage.setItem(UNLOCKED_KEY, JSON.stringify([...unlockedAbilities])); } catch {}
  }
  const unlockedAbilities = loadUnlocked();
  function unlockAbility(id) {
    if (unlockedAbilities.has(id)) return;
    unlockedAbilities.add(id);
    saveUnlocked();
    toast(`🔓 도감 해금: ${ABILITY_DEFS[id].name}`);
  }

  // ===== 화면 전환 (메뉴 / 도감 / 게임) =====
  let currentScreen = 'menu';
  const menuEl = document.getElementById('menu');
  const codexEl = document.getElementById('codex');
  const gameEl = document.getElementById('wrap');
  function showScreen(name) {
    currentScreen = name;
    menuEl.classList.toggle('show', name === 'menu');
    codexEl.classList.toggle('show', name === 'codex');
    gameEl.style.display = name === 'game' ? 'flex' : 'none';
    if (name === 'game') fitScale();
  }

  document.getElementById('startBtn').onclick = () => {
    reset();
    renderPanel();
    document.getElementById('pauseBtn').textContent = '⏸ 일시정지';
    showScreen('game');
  };
  document.getElementById('codexBtn').onclick = () => {
    buildCodex();
    showScreen('codex');
  };
  document.getElementById('codexBack').onclick = () => showScreen('menu');

  // ===== 도감 콘텐츠 생성 =====
  let codexTab = 'basic';
  document.querySelectorAll('.codex-tab').forEach(btn => {
    btn.onclick = () => {
      codexTab = btn.dataset.tab;
      document.querySelectorAll('.codex-tab').forEach(x => x.classList.toggle('active', x === btn));
      buildCodex();
    };
  });
  function buildCodex() {
    const list = document.getElementById('codex-list');
    list.innerHTML = '';
    const showBasic = codexTab === 'basic';
    // 탭 라벨에 해금 개수 갱신
    const basicIds = ALL_ABILITY_IDS.filter(id => !ABILITY_DEFS[id].isCombo);
    const comboIds = ALL_ABILITY_IDS.filter(id =>  ABILITY_DEFS[id].isCombo);
    const basicUL = basicIds.filter(id => unlockedAbilities.has(id)).length;
    const comboUL = comboIds.filter(id => unlockedAbilities.has(id)).length;
    document.querySelector('.codex-tab[data-tab="basic"]').textContent = `기본 능력 ${basicUL}/${basicIds.length}`;
    document.querySelector('.codex-tab[data-tab="combo"]').textContent = `조합 능력 ${comboUL}/${comboIds.length}`;

    for (const id of ALL_ABILITY_IDS) {
      const def = ABILITY_DEFS[id];
      if (showBasic && def.isCombo) continue;
      if (!showBasic && !def.isCombo) continue;
      const card = document.createElement('div');
      card.className = 'codex-card';
      if (!unlockedAbilities.has(id)) {
        // 잠긴 카드 — 정보 가림
        card.classList.add('locked');
        card.innerHTML = `
          <div class="name">🔒 ? ? ?</div>
          <div class="desc">플레이하며 획득하면 해금됩니다.</div>
        `;
        list.appendChild(card);
        continue;
      }
      // 해금된 카드 — 정보 노출
      card.style.borderLeftColor = def.color;
      let extra = '';
      if (def.isCombo) {
        const recipe = COMBO_RECIPES.find(r => r.combo === id);
        if (recipe) {
          const a = ABILITY_DEFS[recipe.parts[0]];
          const b = ABILITY_DEFS[recipe.parts[1]];
          extra = `<div class="recipe">재료: <span style="color:${a.color}">${a.name}</span> + <span style="color:${b.color}">${b.name}</span></div>`;
        }
      } else if (COMBO_PARTNER[id]) {
        const p = COMBO_PARTNER[id];
        const partner = ABILITY_DEFS[p.partner];
        const combo = ABILITY_DEFS[p.combo];
        // 파트너/조합도 해금되었을 때만 이름 노출, 아니면 흐림 처리
        const partnerLabel = unlockedAbilities.has(p.partner)
          ? `<span style="color:${partner.color}">${partner.name}</span>`
          : `<span style="color:#4a5163">???</span>`;
        const comboLabel = unlockedAbilities.has(p.combo)
          ? `<span style="color:${combo.color}">${combo.name}</span>`
          : `<span style="color:#4a5163">???</span>`;
        extra = `<div class="recipe">+ ${partnerLabel} → ${comboLabel}</div>`;
      }
      card.innerHTML = `
        <div class="name" style="color:${def.color}">${def.name}</div>
        <div class="desc">${def.desc(1)}</div>
        ${extra}
      `;
      list.appendChild(card);
    }
  }

  // ===== 시작 =====
  // 게임은 startBtn 클릭 시 reset() 호출됨. 여기서는 메뉴만 표시.
  reset();   // state 초기 구조만 만들어둠 (loop이 안전하게 동작하도록)
  (function loop(){
    if (currentScreen === 'game') {
      const steps = paused || state.gameOver ? 1 : gameSpeed;
      for (let i = 0; i < steps; i++) update();
      render();
    }
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
