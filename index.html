  function saveRecord() {
    // 점수 0 + R1에서 즉시 끝낸 경우는 저장 안 함
    if (state.score === 0 && state.round <= 1) return;
    const records = loadRecords();
    records.push({
      score: state.score,
      round: state.gameWin ? MAX_ROUND : Math.max(1, state.round - (state.gameWin ? 0 : 1)),
      date: Date.now(),
      abilities: state.tower.abilities.map(a => ({ id: a.id, level: a.level })),
      win: !!state.gameWin,
    });
    records.sort((a, b) => b.score - a.score);
    records.length = Math.min(records.length, 10);
    try { localStorage.setItem(RECORDS_KEY, JSON.stringify(records)); } catch {}
  }

  function planRound() {
    const cfg = roundConfig(state.round);
    state.roundFrame = 0;
    state.spawnPlan = [];
    for (let i = 0; i < cfg.spawnCount; i++) {
      state.spawnPlan.push((i + 1) * cfg.spawnInterval);
    }
    // 보스 스폰 큐. 일반: [], 보스 라운드: [60], 최종: [60, +50s, +100s]
    if (cfg.isFinal) {
      state.bossSpawns = [60, 60 + 50 * FPS, 60 + 100 * FPS];
    } else if (cfg.isBoss) {
      state.bossSpawns = [60];
    } else {
      state.bossSpawns = [];
    }
  }

  // ===== 능력용 헬퍼 =====
  function findNearestEnemy(range) {
    let target = null, best = Infinity;
    const r2 = range * range;
    for (const e of state.enemies) {
      if (e.hp <= 0) continue;
      const [x, y] = enemyXY(e);
      const d2 = (x-CX)*(x-CX) + (y-CY)*(y-CY);
      if (d2 < r2 && d2 < best) { best = d2; target = e; }
    }
    return target;
  }
  function findFarthestEnemy(range) {
    let target = null, best = -1;
    const r2 = range * range;
    for (const e of state.enemies) {
      if (e.hp <= 0) continue;
      const [x, y] = enemyXY(e);
      const d2 = (x-CX)*(x-CX) + (y-CY)*(y-CY);
      if (d2 < r2 && d2 > best) { best = d2; target = e; }
    }
    return target;
  }
  // target: 유도 대상 (null이면 직진)
  // leader: 리더 탄환 (null이면 일반 탄환). 사이드 탄환은 리더 방향을 추종.
  // offsetAngle: 리더 진행 방향 대비 사이드 탄환의 고정 각도 오프셋
  function fireBullet(angle, dmg, color, target, leader, offsetAngle) {
    const b = {
      x: CX, y: CY,
      vx: Math.cos(angle)*7, vy: Math.sin(angle)*7,
      dmg, life: 100, color,
      target: target || null,
      leader: leader || null,
      offsetAngle: offsetAngle || 0,
    };
    state.bullets.push(b);
    return b;
  }
  function damageEnemy(e, dmg) {
    if (e.hp <= 0) return;
    // 모든 데미지 멀티 (캐릭터 + 모든 패시브 + 메타 효과)
    if (state.metaMods) {
      const mm = state.metaMods;
      let mul = (mm.dmgMul || 1)
        * (1 + (mm.dmgBoost || 0))            // 메타: 데미지 부스트
        * (1 + (mm.furyBonus || 0))           // 액티브 패시브: 분노
        * (1 + (mm.precisionBonus || 0))      // 패시브: 정확
        * (1 + (mm.frenzyBonus || 0))         // 패시브: 광폭
        * (1 + (mm.masteryBonus || 0));       // 패시브: 숙련
      if (e.isBoss) {
        mul *= (mm.bossDmgMul || 1) * (1 + (mm.ironwillBonus || 0));
      }
      dmg = dmg * mul;
    }
    // 보호막 적/보스: 처음 N회 데미지는 무효 (보호막 카운트만 줄임)
    if ((e.behavior === 'shielded' || (e.isBoss && e.shieldHp > 0)) && e.shieldHp > 0) {
      e.shieldHp--;
      const [ex, ey] = enemyXY(e);
      spawnParticles(ex, ey, '#88ccff', 2);
      state.damageNumbers.push({
        x: ex, y: ey - e.size - 4, vy: -0.6,
        text: 'BLOCK', color: '#88ccff', life: 25, size: 10,
      });
      return;
    }
    e.lastDamageAt = state.t;
    e.hp -= dmg;
    const [ex, ey] = enemyXY(e);
    // 데미지 숫자 — 평소엔 흰색, 큰 데미지(크리티컬)만 골드로 강조
    const big = dmg >= 30;
    state.damageNumbers.push({
      x: ex + (Math.random() - 0.5) * 6,
      y: ey - e.size - 4,
      vy: -0.7,
      text: String(Math.round(dmg)),
      color: big ? '#ffd479' : '#dde2ec',
      life: 26,
      size: big ? 13 : 10,
    });
    if (e.hp <= 0) {
      const mm = state.metaMods || { goldMul: 1, scoreMul: 1 };
      // 골드 — 흡혈 패시브 + 보스 골드 보너스 (메타)
      const bossGold = e.isBoss ? (1 + (mm.bossGoldMul || 0)) : 1;
      state.gold += Math.ceil(e.goldDrop * mm.goldMul * (1 + (mm.bonusGoldMul || 0)) * bossGold);
      // 점수 + 행운 보너스 (확률)
      state.score += Math.ceil(10 * state.round * mm.scoreMul);
      if (mm.fortuneChance && Math.random() < mm.fortuneChance) {
        const fortuneBonus = Math.ceil(40 * state.round * mm.scoreMul);
        state.score += fortuneBonus;
        const [ex2, ey2] = enemyXY(e);
        state.damageNumbers.push({
          x: ex2, y: ey2 - e.size - 12, vy: -1.2,
          text: '+' + fortuneBonus, color: '#ffcc66', life: 35, size: 12,
        });
      }
      // 광폭 트리거
      state.frenzyTrigger = true;
      state.kills++;
      state.totalKills = (state.totalKills || 0) + 1;
      if (e.isBoss) state.bossKills = (state.bossKills || 0) + 1;
      spawnParticles(ex, ey, '#ff5b6e', e.isBoss ? 20 : 8);
      SFX.kill();
      if (e.isBoss) {
        shake(18, 12);
        SFX.explode();
      } else {
        shake(4, 4);
      }
      // 분열형: 죽을 때 작은 2마리로 갈라짐 (자식은 분열 X)
      if (e.behavior === 'splitter' && !e.isChild) {
        const cfg = roundConfig(state.round);
        for (let k = 0; k < 2; k++) {
          const newA = e.angle + (k === 0 ? -0.15 : 0.15);
          spawnEnemy({
            angle: newA, radius: e.radius,
            hp: Math.max(1, Math.ceil(e.maxHp * 0.4)),
            behavior: null, size: 5, type: e.type,
          });
          // 자식 표시
          const last = state.enemies[state.enemies.length - 1];
          if (last) { last.isChild = true; last.goldDrop = Math.max(1, Math.ceil(e.goldDrop * 0.5)); }
        }
      }
      // 레벨업 트리거 (모달 띄움)
      if (state.kills >= state.killsToNextLevel && !state.levelUpChoices) {
        triggerLevelUp();
      }
    }
  }
  // 화면 흔들림 트리거
  function shake(strength, frames) {
    if (state.shakeStrength < strength) state.shakeStrength = strength;
    if (state.shakeFrames < frames) state.shakeFrames = frames;
  }

  // ===== 능력 Max 레벨 시스템 =====
  // 뱀파이어 서바이버즈 스타일: 재료 둘 다 max 도달 시 다음 카드에서 조합 옵션 등장
  function maxLvFor(id) {
    const def = ABILITY_DEFS[id];
    if (!def) return 8;
    if (def.isTriple) return 4;
    if (def.isCombo) return 5;
    return 8;  // 기본 액티브/패시브
  }
  function isAtMax(a) { return a.level >= maxLvFor(a.id); }

  // 두 재료가 모두 max 도달한 조합 레시피들을 반환
  function findAvailableCombos() {
    const ownedAbs = state.tower.abilities;
    const ownedIds = new Set(ownedAbs.map(a => a.id));
    const available = [];
    for (const r of COMBO_RECIPES) {
      if (!ownedIds.has(r.parts[0]) || !ownedIds.has(r.parts[1])) continue;
      if (ownedIds.has(r.combo)) continue;  // 이미 보유 시 제외
      const a1 = ownedAbs.find(a => a.id === r.parts[0]);
      const a2 = ownedAbs.find(a => a.id === r.parts[1]);
      if (!isAtMax(a1) || !isAtMax(a2)) continue;
      available.push(r);
    }
    return available;
  }

  // ===== 레벨업 시스템 =====
  function generateLevelUpChoices() {
    const choices = [];

    // 1) 조합 카드 — 두 재료 모두 max 도달 시 1장 보장 (트리플 우선)
    const availableCombos = findAvailableCombos().slice();
    availableCombos.sort((a, b) => (b.tier || 2) - (a.tier || 2));
    if (availableCombos.length > 0) {
      const r = availableCombos[0];
      choices.push({
        action: 'combo',
        id: r.combo,
        parts: r.parts,
        tier: r.tier || 2,
      });
    }

    const owned = new Set(state.tower.abilities.map(a => a.id));
    const allowed = getUnlockedAbilityIds();
    const unownedActive  = BASIC_ABILITY_IDS.filter(id => !owned.has(id) && allowed.has(id) && !ABILITY_DEFS[id].isPassive);
    const unownedPassive = BASIC_ABILITY_IDS.filter(id => !owned.has(id) && allowed.has(id) &&  ABILITY_DEFS[id].isPassive);
    // 강화 대상은 max 미달 능력만
    const ownedAbilities = state.tower.abilities.filter(a => !isAtMax(a));
    while (choices.length < 3) {
      const newActiveCount = choices.filter(c => c.action === 'new' && !ABILITY_DEFS[c.id].isPassive).length;
      const newPassiveCount = choices.filter(c => c.action === 'new' && ABILITY_DEFS[c.id].isPassive).length;
      const aSlotsFree = activeCount() + newActiveCount < maxActiveSlots();
      const pSlotsFree = passiveCount() + newPassiveCount < maxPassiveSlots();
      const newActivePool = unownedActive.filter(id => !choices.some(c => c.action === 'new' && c.id === id));
      const newPassivePool = unownedPassive.filter(id => !choices.some(c => c.action === 'new' && c.id === id));
      const lvPool = ownedAbilities.filter(a => !choices.some(c => c.action === 'level' && c.id === a.id));
      const canNewA = aSlotsFree && newActivePool.length > 0;
      const canNewP = pSlotsFree && newPassivePool.length > 0;
      const canLv = lvPool.length > 0;
      if (!canNewA && !canNewP && !canLv) break;
      // 초반엔 new 위주, 후반엔 level. 액티브 60% / 패시브 30% / 강화 사이.
      const roll = Math.random();
      const earlyGame = state.playerLevel < 4;
      let pick = null;
      if ((canNewA || canNewP) && (!canLv || roll < (earlyGame ? 0.75 : 0.45))) {
        // 신규 — 액티브가 더 자주 (적이 있는 경우만)
        const preferActive = canNewA && (!canNewP || Math.random() < 0.6);
        const pool = preferActive ? newActivePool : newPassivePool;
        const fallback = preferActive ? newPassivePool : newActivePool;
        const finalPool = pool.length > 0 ? pool : fallback;
        if (finalPool.length === 0) break;
        const id = finalPool[Math.floor(Math.random() * finalPool.length)];
        choices.push({ action: 'new', id, newLevel: 1 });
      } else if (canLv) {
        const p = lvPool[Math.floor(Math.random() * lvPool.length)];
        choices.push({ action: 'level', id: p.id, level: p.level, newLevel: p.level + 1 });
      } else break;
    }
    // 남은 자리는 보너스 카드 (점수 / 스타더스트)
    while (choices.length < 3) {
      const scoreMul = (state.metaMods && state.metaMods.scoreMul) || 1;
      if (Math.random() < 0.6) {
        // 점수 보너스 (라운드에 비례)
        const amount = Math.floor(800 * state.round * scoreMul * (0.85 + Math.random() * 0.4));
        choices.push({ action: 'bonusScore', amount });
      } else {
        // 스타더스트 (영구 통화 소량)
        const amount = 3 + Math.floor(Math.random() * 8);
        choices.push({ action: 'bonusStardust', amount });
      }
    }
    return choices;
  }
  function triggerLevelUp() {
    state.playerLevel++;
    state.kills = 0;
    const mul = (state.metaMods && state.metaMods.levelUpMul) || 1;
    const fast = (state.metaMods && state.metaMods.levelUpFast) || 0;
    state.killsToNextLevel = Math.max(3, Math.floor((8 + state.playerLevel * 4) * mul - fast));
    const choices = generateLevelUpChoices();
    // 항상 3장 (능력 카드 부족 시 보너스 카드로 채움)
    state.levelUpChoices = choices;
    SFX.levelup();
  }
  function applyLevelUpChoice(idx) {
    if (!state.levelUpChoices) return;
    if (idx === -1) {  // 취소 (랜덤 모달인 경우만 허용)
      if (state.cardCancelable) {
        state.levelUpChoices = null;
        state.cardCost = 0;
        state.cardCancelable = false;
        SFX.click();
      }
      return;
    }
    const c = state.levelUpChoices[idx];
    if (!c) return;
    // 카드가 랜덤 획득 모달에서 온 경우 — 비용이 0이어도 acquireCount 증가
    // (다음 번부터 비용이 늘어남: 0 → 25 → 60 → ...)
    if (state.cardCancelable) {
      if (state.cardCost > 0) state.gold -= state.cardCost;
      state.tower.acquireCount += 1;
    }
    if (c.action === 'new') {
      const ab = { id: c.id, level: 1 };
      ABILITY_DEFS[c.id].init(ab);
      state.tower.abilities.push(ab);
      unlockAbility(c.id);
    } else if (c.action === 'level') {
      const a = state.tower.abilities.find(x => x.id === c.id);
      if (a && !isAtMax(a)) a.level++;
    } else if (c.action === 'bonusScore') {
      state.score += c.amount;
      state.damageNumbers.push({
        x: CX, y: CY - 80, vy: -1.5,
        text: `+${c.amount.toLocaleString()}`,
        color: '#bcf0d2', life: 50, size: 16,
      });
      toast(`🎁 점수 +${c.amount.toLocaleString()}`);
    } else if (c.action === 'bonusStardust') {
      META.stardust = (META.stardust || 0) + c.amount;
      saveMeta();
      state.damageNumbers.push({
        x: CX, y: CY - 80, vy: -1.5,
        text: `+${c.amount}★`,
        color: '#ffe890', life: 50, size: 16,
      });
      toast(`⭐ 스타더스트 +${c.amount}`);
    } else if (c.action === 'combo') {
      // 조합 카드: 재료 2개 소진 → 새 조합 능력 생성
      const recipe = COMBO_RECIPES.find(r => r.combo === c.id);
      if (recipe) {
        const i1 = state.tower.abilities.findIndex(a => a.id === recipe.parts[0]);
        const i2 = state.tower.abilities.findIndex(a => a.id === recipe.parts[1]);
        if (i1 !== -1 && i2 !== -1) {
          state.tower.abilities.splice(Math.max(i1, i2), 1);
          state.tower.abilities.splice(Math.min(i1, i2), 1);
          const newAb = { id: c.id, level: 1 };
          ABILITY_DEFS[c.id].init(newAb);
          state.tower.abilities.push(newAb);
          // 화려한 형성 연출
          const isTriple = c.tier === 3;
          state.comboFlash = isTriple ? 50 : 30;
          state.comboFlashColor = ABILITY_DEFS[c.id].color || '#ffaa55';
          state.comboReveal = { id: c.id, level: 1, life: isTriple ? 90 : 60 };
          for (let k = 0; k < (isTriple ? 80 : 40); k++) spawnParticles(CX, CY, state.comboFlashColor, 1);
          shake(isTriple ? 20 : 12, isTriple ? 30 : 20);
          SFX.combo();
          toast(isTriple ? `🔥 트리플 조합! ${ABILITY_DEFS[c.id].name}` : `✨ ${ABILITY_DEFS[c.id].name} 조합 완성!`);
          unlockAbility(c.id);
        }
      }
    }
    state.levelUpChoices = null;
    state.cardCost = 0;
    state.cardCancelable = false;
    SFX.click();
    renderPanel();
  }
  function distPointSegmentSq(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const len2 = dx*dx + dy*dy;
    if (len2 === 0) return (px-ax)*(px-ax) + (py-ay)*(py-ay);
    let t = ((px-ax)*dx + (py-ay)*dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const cx = ax + t*dx, cy = ay + t*dy;
    return (px-cx)*(px-cx) + (py-cy)*(py-cy);
  }

  function enhanceCost(ability) {
    const def = ABILITY_DEFS[ability.id];
    const mm = state.metaMods || { enhanceMul: 1 };
    return Math.ceil(def.baseCost * (ability.level + 1) * 0.7 * mm.enhanceMul * (mm.scholarMul || 1));
  }

  // 랜덤 능력 획득 비용: 0, 25, 60, 110, 180, 270, ...
  // 첫 획득은 0G, 누적 횟수에 따라 점점 비싸짐
  function randomAcquireCost() {
    const n = state.tower.acquireCount;
    if (n === 0) return 0;
    return 25 + (n - 1) * 25 + (n - 1) * (n - 1) * 10;
  }

  // ===== 액션 =====
  function actRandomAcquire() {
    if (state.gameOver) return;
    if (state.levelUpChoices) return;  // 이미 카드 모달 활성
    const cost = randomAcquireCost();
    if (state.gold < cost) return toast('골드 부족');
    const aSlotsFree = activeCount() < maxActiveSlots();
    const pSlotsFree = passiveCount() < maxPassiveSlots();
    if (!aSlotsFree && !pSlotsFree) return toast('슬롯 가득 (삭제 후 가능)');
    // 3장 카드 생성 (레벨업과 동일한 풀)
    const choices = generateLevelUpChoices();
    if (choices.length === 0) return toast('새 능력 없음');
    // 카드 모달 표시 + 비용 정보 부착
    state.levelUpChoices = choices;
    state.cardCost = cost;   // 카드 선택 시 차감
    state.cardCancelable = true;
    SFX.click();
  }

  function actEnhance(idx) {
    if (state.gameOver) return;
    const a = state.tower.abilities[idx];
    if (!a) return;
    if (isAtMax(a)) return toast('이미 MAX — 조합 카드 대기');
    const cost = enhanceCost(a);
    if (state.gold < cost) return toast('골드 부족');
    state.gold -= cost;
    a.level += 1;
    toast(`${ABILITY_DEFS[a.id].name} Lv${a.level}${isAtMax(a) ? ' MAX!' : ''}`);
    renderPanel();
  }

  function actDelete(idx) {
    if (state.gameOver) return;
    const a = state.tower.abilities[idx];
    if (!a) return;
    // 강화에 들인 골드의 40% 환불 (랜덤 획득 비용은 환불 없음)
    let refund = 0;
    for (let lv = 1; lv < a.level; lv++) {
      refund += Math.ceil(enhanceCost({id:a.id, level:lv}) * 0.4);
    }
    state.gold += refund;
    state.tower.abilities.splice(idx, 1);
    toast(refund > 0 ? `삭제 · ${refund}G 환불` : `삭제됨`);
    renderPanel();
  }

  // ===== 적 스폰 =====
  const ENEMY_MIN_R = CORE_R + 40;
  const ENEMY_MAX_R = ARENA_R - 20;
  // 적 타입은 라운드별로 순환 — 비주얼 변화 + 라운드 진척 체감
  // R1:소행성  R2:얼음  R3:드론  R4:플라즈마  R5:크리스탈+보스  R6~ 반복
  const ENEMY_TYPES = ['asteroid', 'ice', 'drone', 'plasma', 'crystal'];
  function getEnemyType(round) {
    return ENEMY_TYPES[(round - 1) % ENEMY_TYPES.length];
  }
  // seed 기반 결정적 난수 (개체별 디테일 변형용)
  function srand(s) { const x = Math.sin(s) * 10000; return x - Math.floor(x); }

  // 특수 행동: 라운드별로 일부 적이 특수 행동을 가짐
  // splitter (분열) / regen (재생) / shielded (보호막) / charger (돌격) — R3+ 부터 무작위로 섞임
  function pickEnemyBehavior(round) {
    if (round < 3) return null;
    const r = Math.random();
    const chance = Math.min(0.5, 0.10 + round * 0.015);  // R3:14%, R10:25%, R30:50%
    if (r > chance) return null;
    const pool = ['splitter', 'regen', 'shielded', 'charger'];
    return pool[Math.floor(Math.random() * pool.length)];
  }
  function spawnEnemy(opts = {}) {
    const cfg = roundConfig(state.round);
    const a = opts.angle !== undefined ? opts.angle : Math.random() * Math.PI * 2;
    const r = opts.radius !== undefined ? opts.radius : ENEMY_MIN_R + Math.random() * (ENEMY_MAX_R - ENEMY_MIN_R);
    const dir = Math.random() < 0.5 ? 1 : -1;
    const behavior = opts.behavior !== undefined ? opts.behavior : pickEnemyBehavior(state.round);
    let hp = opts.hp !== undefined ? opts.hp : cfg.enemyHp;
    let size = 7;
    if (behavior === 'shielded') hp = Math.ceil(hp * 1.6);  // 더 단단
    if (behavior === 'charger') size = 6;
    if (opts.size) size = opts.size;
    state.enemies.push({
      angle: a, radius: r,
      targetRadius: ENEMY_MIN_R + Math.random() * (ENEMY_MAX_R - ENEMY_MIN_R),
      radiusChangeAt: Math.floor(60 + Math.random()*120),
      angularSpeed: cfg.enemySpeed * dir * (behavior === 'charger' ? 2.0 : (0.5 + Math.random()*0.8)),
      hp, maxHp: hp, size,
      goldDrop: cfg.enemyGold,
      slowFrames: 0,
      isBoss: false,
      type: opts.type || getEnemyType(state.round),
      seed: Math.random() * 1000,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.04,
      behavior,
      shieldHp: behavior === 'shielded' ? 5 : 0,  // 첫 X회 데미지 면역
      regenTimer: 0,
      lastDamageAt: 0,
    });
  }
  // 보스 패턴: 라운드별로 다른 능력 — 소환사/광폭화/실드 중 하나
  function pickBossPattern(round) {
    if (round < 10) return 'basic';      // R5: 평범
    if (round < 20) return 'summoner';   // R10-15: 잡몹 소환
    if (round < 30) return 'enrage';     // R20-25: HP낮으면 가속+공격력
    return ['summoner', 'enrage', 'shield'][Math.floor(Math.random() * 3)];  // R30+: 랜덤
  }
  function spawnBoss() {
    const cfg = roundConfig(state.round);
    const a = Math.random() * Math.PI * 2;
    const r = ENEMY_MAX_R - 30;
    state.enemies.push({
      angle: a, radius: r,
      targetRadius: 100 + Math.random() * 150,
      radiusChangeAt: 240,
      angularSpeed: cfg.enemySpeed * (Math.random() < 0.5 ? 1 : -1) * 0.4,
      hp: cfg.bossHp, maxHp: cfg.bossHp,
      size: 18, goldDrop: cfg.bossGold,
      slowFrames: 0, isBoss: true,
      type: 'boss', seed: Math.random() * 1000,
      rotation: 0, rotSpeed: 0.012,
      pattern: pickBossPattern(state.round),
      patternCD: 180,    // 보스 능력 쿨다운
      enraged: false,
      shieldHp: 0,
      lastDamageAt: 0,
    });
  }
  // 보스 능력 업데이트
  function updateBossPatterns() {
    for (const e of state.enemies) {
      if (!e.isBoss) continue;
      if (e.patternCD > 0) e.patternCD--;

      // 광폭화: HP 30% 이하면 가속 + 공격력 (영구)
      if (e.pattern === 'enrage' && !e.enraged && e.hp < e.maxHp * 0.3) {
        e.enraged = true;
        e.angularSpeed *= 2;
        e.rotSpeed *= 2;
        e.size = Math.ceil(e.size * 1.15);
        shake(15, 20);
        SFX.bossSpawn();
        toast('⚠️ 보스 광폭화!');
      }
      // 소환사: 주기적으로 잡몹 2-3마리 소환
      if (e.pattern === 'summoner' && e.patternCD <= 0) {
        const [bx, by] = enemyXY(e);
        const n = 2 + Math.floor(Math.random() * 2);
        for (let k = 0; k < n; k++) {
          const aa = Math.random() * Math.PI * 2;
          spawnEnemy({
            angle: aa, radius: e.radius,
            behavior: null, size: 6,
          });
          // 시각: 소환 위치 표시
          const last = state.enemies[state.enemies.length - 1];
          if (last) { last.angle = e.angle + (k - n/2) * 0.2; last.radius = e.radius - 20; }
        }
        spawnParticles(bx, by, '#cc66ff', 12);
        SFX.combo();
        e.patternCD = 360;  // 6초마다
      }
      // 실드: HP 50% 이하 시 일시 보호막
      if (e.pattern === 'shield' && !e.shieldUsed && e.hp < e.maxHp * 0.5) {
        e.shieldUsed = true;
        e.shieldHp = 20;
        const [bx, by] = enemyXY(e);
        spawnParticles(bx, by, '#88ccff', 16);
        toast('🛡 보스 실드 발동!');
        SFX.bossSpawn();
      }
    }
  }

  // ===== 업데이트 =====
  function update() {
    if (paused || state.gameOver || state.levelUpChoices) return;
    state.t++;

    // 라운드 진행
    const cfg = roundConfig(state.round);
    state.roundFrame++;
    while (state.spawnPlan.length && state.spawnPlan[0] <= state.roundFrame) {
      state.spawnPlan.shift();
      spawnEnemy();
    }
    // 보스 스폰 (큐에 있는 시점 도달 시 차례로)
    while (state.bossSpawns && state.bossSpawns.length && state.roundFrame >= state.bossSpawns[0]) {
      state.bossSpawns.shift();
      // 이전 보스를 처치하지 못했으면 게임오버
      if (state.enemies.some(e => e.isBoss)) {
        endGame('이전 보스를 처치하지 못함', false);
        break;
      } else {
        spawnBoss();
        shake(15, 12);
        SFX.bossSpawn();
      }
    }
    if (state.gameOver) return;

    // 조기 클리어: 모든 적 처치 + 더 이상 스폰 없음 → 즉시 다음 라운드 + 시간 보너스
    if (state.enemies.length === 0
        && state.spawnPlan.length === 0
        && state.bossSpawns.length === 0
        && state.roundFrame > 60) {
      const timeSaved = (cfg.duration - state.roundFrame) / FPS;
      const bonus = Math.floor(timeSaved * 10 * state.round);
      state.score += bonus;
      SFX.waveClear();
      // 화면 가운데 큰 텍스트로 클리어 표시
      state.waveClearText = {
        round: state.round, bonus, timeSaved, life: 70,
      };
      toast(`R${state.round} 클리어! +${bonus} (${timeSaved.toFixed(1)}s 단축)`);
      advanceRound();
    }
    // 라운드 시간 만료 → 다음 라운드 (적이 남았어도 진행)
    else if (state.roundFrame >= cfg.duration) {
      advanceRound();
    }

    // 게임오버 체크 (적 누적)
    if (state.enemies.length >= MAX_ALIVE) {
      endGame(`적이 ${MAX_ALIVE}마리를 넘김`, false);
    }

    // 적 이동 + 특수 행동 처리
    for (const e of state.enemies) {
      const slowMul = e.slowFrames > 0 ? 0.35 : 1;
      if (e.slowFrames > 0) e.slowFrames--;
      e.angle += e.angularSpeed * slowMul;
      const dr = e.targetRadius - e.radius;
      if (Math.abs(dr) > 0.2) e.radius += Math.sign(dr) * 0.4 * slowMul;
      e.radiusChangeAt--;
      if (e.radiusChangeAt <= 0) {
        e.targetRadius = ENEMY_MIN_R + Math.random() * (ENEMY_MAX_R - ENEMY_MIN_R);
        e.radiusChangeAt = 90 + Math.floor(Math.random()*150);
      }
      // 재생형: 2초 동안 데미지 안 받으면 매 frame +0.5% maxHp 회복
      if (e.behavior === 'regen' && (state.t - e.lastDamageAt) > 120 && e.hp < e.maxHp) {
        e.hp = Math.min(e.maxHp, e.hp + e.maxHp * 0.005);
        if (Math.random() < 0.1) {
          const [ex, ey] = enemyXY(e);
          spawnParticles(ex, ey, '#88ff88', 1);
        }
      }
    }
    // 보스 능력 패턴 처리
    updateBossPatterns();

    // 능력 tick (각 능력이 독립적으로 작동)
    for (const ab of state.tower.abilities) {
      ABILITY_DEFS[ab.id].tick(ab);
    }

    // 탄환 이동 + (리더 추종 or 약한 유도) + 충돌
    for (const b of state.bullets) {
      // 리더 추종: 사이드 탄환은 리더 진행 방향 + 자기 오프셋 각도로 맞춤
      if (b.leader && b.leader.life > 0) {
        const leaderAng = Math.atan2(b.leader.vy, b.leader.vx);
        const myAng = leaderAng + b.offsetAngle;
        const sp = Math.hypot(b.vx, b.vy);
        b.vx = Math.cos(myAng) * sp;
        b.vy = Math.sin(myAng) * sp;
      }
      // 약한 유도: 타깃이 살아있으면 속도 방향을 살짝 보정
      else if (b.target && b.target.hp > 0) {
        const [tx, ty] = enemyXY(b.target);
        const curAng  = Math.atan2(b.vy, b.vx);
        const wantAng = Math.atan2(ty - b.y, tx - b.x);
        let diff = wantAng - curAng;
        while (diff >  Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const turn = 0.06;
        const c = Math.max(-turn, Math.min(turn, diff));
        const a = curAng + c;
        const sp = Math.hypot(b.vx, b.vy);
        b.vx = Math.cos(a) * sp;
        b.vy = Math.sin(a) * sp;
      }
      b.x += b.vx; b.y += b.vy; b.life--;
      const dx = b.x - CX, dy = b.y - CY;
      if (dx*dx + dy*dy > (ARENA_R+30)*(ARENA_R+30)) b.life = 0;
      for (const e of state.enemies) {
        if (e.hp <= 0) continue;
        const [ex, ey] = enemyXY(e);
        const r = e.size + 2;
        if ((b.x-ex)*(b.x-ex) + (b.y-ey)*(b.y-ey) < r*r) {
          damageEnemy(e, b.dmg);
          spawnParticles(ex, ey, b.color || '#ffd479', 2);
          // 폭발탄: 추가 광역 데미지
          if (b.explodeRadius) {
            for (const e2 of state.enemies) {
              if (e2 === e || e2.hp <= 0) continue;
              const [ex2, ey2] = enemyXY(e2);
              if ((b.x-ex2)*(b.x-ex2) + (b.y-ey2)*(b.y-ey2) < b.explodeRadius * b.explodeRadius) {
                damageEnemy(e2, b.dmg);
                spawnParticles(ex2, ey2, b.color || '#ff8866', 2);
              }
            }
            if (b.explodeAb) b.explodeAb.explosions.push({ x: b.x, y: b.y, r: b.explodeRadius, life: 12 });
          }
          // 슬로우 적용탄
          if (b.slow) e.slowFrames = Math.max(e.slowFrames || 0, b.slow);
          b.life = 0;
          break;
        }
      }
    }

    state.bullets   = state.bullets.filter(b => b.life > 0);
    state.enemies   = state.enemies.filter(e => e.hp > 0);
    for (const p of state.particles) { p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.life--; }
    state.particles = state.particles.filter(p => p.life > 0);
    // 데미지 숫자 부유
    for (const d of state.damageNumbers) { d.y += d.vy; d.vy *= 0.95; d.life--; }
    state.damageNumbers = state.damageNumbers.filter(d => d.life > 0);
    // 콤보 카드 라이프
    if (state.comboReveal) {
      state.comboReveal.life--;
      if (state.comboReveal.life <= 0) state.comboReveal = null;
    }
    // 웨이브 클리어 텍스트
    if (state.waveClearText) {
      state.waveClearText.life--;
      if (state.waveClearText.life <= 0) state.waveClearText = null;
    }
    // 화면 흔들림 잔여 감소
    if (state.shakeFrames > 0) {
      state.shakeFrames--;
      state.shakeStrength *= 0.88;
    } else {
      state.shakeStrength = 0;
    }
    if (state.comboFlash > 0) state.comboFlash--;
    updateBackground();

    renderStats();
  }

  // ===== 유틸 =====
  function enemyXY(e){ return [CX + Math.cos(e.angle)*e.radius, CY + Math.sin(e.angle)*e.radius]; }
  function spawnParticles(x, y, color, n=6){
    // 파티클 수 줄이고 수명 짧게 — 시각적 노이즈 감소
    n = Math.max(1, Math.floor(n * 0.6));
    for (let i=0; i<n; i++){
      const a = Math.random()*Math.PI*2;
      const s = 0.5 + Math.random()*1.3;
      state.particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 12 + Math.random()*8, color });
    }
  }

  // ===== 우주 배경 =====
  const BG = { stars: [], planets: [], nebulae: [], meteors: [], meteorTimer: 200 };
  function initBackground() {
    BG.stars.length = 0;
    BG.planets.length = 0;
    BG.nebulae.length = 0;
    BG.meteors.length = 0;
    // 별: 3개 레이어 패럴랙스
    for (let i = 0; i < 80; i++) BG.stars.push({       // 멀리 (옅고 작음)
      x: Math.random()*W, y: Math.random()*H, size: 1,
      brightness: 0.25 + Math.random()*0.3,
      tw: Math.random()*Math.PI*2, twSpeed: 0.01 + Math.random()*0.02,
      vx: -0.03 - Math.random()*0.02,
    });
    for (let i = 0; i < 40; i++) BG.stars.push({       // 중간
      x: Math.random()*W, y: Math.random()*H, size: Math.random() < 0.5 ? 1 : 2,
      brightness: 0.5 + Math.random()*0.3,
      tw: Math.random()*Math.PI*2, twSpeed: 0.02 + Math.random()*0.03,
      vx: -0.07 - Math.random()*0.04,
    });
    for (let i = 0; i < 15; i++) BG.stars.push({       // 가까이 (밝고 빠름)
      x: Math.random()*W, y: Math.random()*H, size: 2,
      brightness: 0.75 + Math.random()*0.25,
      tw: Math.random()*Math.PI*2, twSpeed: 0.03 + Math.random()*0.04,
      vx: -0.12 - Math.random()*0.06,
    });
    // 행성
    BG.planets.push({ x: 95,  y: 110, r: 52, c1: '#4a2870', c2: '#1a0f30', ring: false });
    BG.planets.push({ x: 545, y: 560, r: 36, c1: '#703020', c2: '#28100a', ring: false });
    BG.planets.push({ x: 525, y: 95,  r: 26, c1: '#205070', c2: '#0d1c30', ring: true, ringC: '#6a8aa8' });
    // 성운
    BG.nebulae.push({ x: 180, y: 480, r: 240, c: 'rgba(110, 60, 210, 0.07)' });
    BG.nebulae.push({ x: 480, y: 210, r: 200, c: 'rgba(60, 180, 220, 0.06)' });
    BG.nebulae.push({ x: 320, y: 320, r: 320, c: 'rgba(160, 80, 200, 0.03)' });
  }
  function updateBackground() {
    for (const s of BG.stars) {
      s.x += s.vx;
      if (s.x < -3) s.x = W + 3;
      s.tw += s.twSpeed;
    }
    BG.meteorTimer--;
    if (BG.meteorTimer <= 0) {
      BG.meteorTimer = 240 + Math.random()*500;
      const fromTop = Math.random() < 0.5;
      BG.meteors.push({
        x: fromTop ? Math.random()*W : W + 50,
        y: fromTop ? -20 : Math.random()*H*0.5,
        vx: -4 - Math.random()*3,
        vy: 3 + Math.random()*2,
        life: 250,
      });
    }
    for (const m of BG.meteors) { m.x += m.vx; m.y += m.vy; m.life--; }
    BG.meteors = BG.meteors.filter(m => m.life > 0 && m.x > -60 && m.y < H + 60);
  }
  function drawBackground() {
    // 어두운 우주 베이스
    ctx.fillStyle = '#06081a';
    ctx.fillRect(0, 0, W, H);
    // 성운 — 광역 그라데이션
    for (const n of BG.nebulae) {
      const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      g.addColorStop(0, n.c);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }
    // 별
    for (const s of BG.stars) {
      const tw = (Math.sin(s.tw) + 1) / 2;
      ctx.globalAlpha = s.brightness * (0.55 + tw * 0.45);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(s.x, s.y, s.size, s.size);
    }
    ctx.globalAlpha = 1;
    // 행성
    for (const p of BG.planets) {
      // 광원 방향(좌상)에서 밝게, 반대편 어둡게 그라데이션
      const g = ctx.createRadialGradient(p.x - p.r*0.35, p.y - p.r*0.35, 0, p.x, p.y, p.r);
      g.addColorStop(0, p.c1);
      g.addColorStop(1, p.c2);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
      // 그림자 (우하 절반)
      ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.beginPath();
      ctx.arc(p.x + p.r*0.35, p.y + p.r*0.35, p.r * 0.92, 0, Math.PI*2);
      ctx.fill();
      // 고리
      if (p.ring) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.scale(1, 0.32);
        ctx.strokeStyle = p.ringC; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, p.r * 1.9, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
      }
    }
    // 배경 유성 (분위기용)
    for (const m of BG.meteors) {
      const alpha = Math.min(1, m.life / 50);
      const len = Math.hypot(m.vx, m.vy);
      const tx = m.x - (m.vx / len) * 28;
      const ty = m.y - (m.vy / len) * 28;
      const grad = ctx.createLinearGradient(m.x, m.y, tx, ty);
      grad.addColorStop(0, `rgba(255, 224, 128, ${alpha * 0.85})`);
      grad.addColorStop(1, 'rgba(255, 224, 128, 0)');
      ctx.strokeStyle = grad; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(m.x, m.y); ctx.lineTo(tx, ty); ctx.stroke();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ffffff'; ctx.fillRect(m.x - 1, m.y - 1, 3, 3);
    }
    ctx.globalAlpha = 1;
  }

  // ===== 렌더 =====
  function drawArena() {
    // 홀로그래픽 동심원 — 옅은 청록
    ctx.strokeStyle = 'rgba(80, 170, 220, 0.10)';
    ctx.lineWidth = 1;
    for (let r = 60; r <= ARENA_R; r += 40) {
      ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI*2); ctx.stroke();
    }
    // 외곽 포스 필드 (옅은 글로우)
    ctx.strokeStyle = 'rgba(120, 220, 255, 0.10)';
    ctx.lineWidth = 8;
    ctx.beginPath(); ctx.arc(CX, CY, ARENA_R, 0, Math.PI*2); ctx.stroke();
    // 외곽 포스 필드 본체
    ctx.strokeStyle = 'rgba(120, 220, 255, 0.45)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(CX, CY, ARENA_R, 0, Math.PI*2); ctx.stroke();
  }
  function drawTower() {
    // 외곽 헥사 링 (천천히 회전)
    const ringRot = state.t * 0.004;
    ctx.strokeStyle = 'rgba(106, 196, 255, 0.22)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = ringRot + i * Math.PI / 3;
      const px = CX + Math.cos(a) * 30;
      const py = CY + Math.sin(a) * 30;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
    // 옅은 외곽 코어 글로우 (느린 펄스)
    const pulse = 1 + Math.sin(state.t * 0.05) * 0.10;
    ctx.fillStyle = 'rgba(106, 196, 255, 0.06)';
    ctx.beginPath(); ctx.arc(CX, CY, 24 * pulse, 0, Math.PI*2); ctx.fill();
    // 본체 사각 (어두운 베이스)
    ctx.fillStyle = '#1a2030';
    ctx.fillRect(CX - 12, CY - 12, 24, 24);
    // 사각 외곽 라인
    ctx.strokeStyle = 'rgba(106, 196, 255, 0.35)';
    ctx.lineWidth = 1;
    ctx.strokeRect(CX - 12, CY - 12, 24, 24);
    // 4 모서리 액센트
    ctx.fillStyle = '#6ac4ff';
    ctx.fillRect(CX - 12, CY - 12, 3, 3);
    ctx.fillRect(CX + 9,  CY - 12, 3, 3);
    ctx.fillRect(CX - 12, CY + 9,  3, 3);
    ctx.fillRect(CX + 9,  CY + 9,  3, 3);
    // 회전 다이아몬드 (중간 — 반대 방향)
    const diaRot = -state.t * 0.014;
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(diaRot);
    ctx.strokeStyle = 'rgba(160, 220, 255, 0.55)';
    ctx.lineWidth = 1.4;
    ctx.strokeRect(-7, -7, 14, 14);
    ctx.restore();
    // 중앙 코어 (작고 밝음)
    const corePulse = 0.85 + 0.15 * Math.sin(state.t * 0.09);
    ctx.globalAlpha = corePulse;
    ctx.fillStyle = '#e0f4ff';
    ctx.fillRect(CX - 2, CY - 2, 4, 4);
    ctx.globalAlpha = 1;
  }
  // ====== 적 타입별 렌더러 (무채색 톤 + 모양으로 구분, 노이즈 최소화) ======
  function drawAsteroidE(e, x, y, slow) {
    const s = e.size;
    ctx.save(); ctx.translate(x, y); ctx.rotate(e.rotation);
    const base = slow ? '#5e7280' : '#6a5848';
    const edge = slow ? '#384a58' : '#3a2e22';
    const lite = slow ? '#90a4b0' : '#8a7660';
    // 8각형 본체 — 외곽 라인으로 정의감 강화
    ctx.fillStyle = base;
    ctx.beginPath();
    ctx.moveTo(-s+2, -s); ctx.lineTo(s-2, -s);
    ctx.lineTo(s, -s+2); ctx.lineTo(s, s-2);
    ctx.lineTo(s-2, s); ctx.lineTo(-s+2, s);
    ctx.lineTo(-s, s-2); ctx.lineTo(-s, -s+2);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = edge; ctx.lineWidth = 1; ctx.stroke();
    // 단일 하이라이트
    ctx.fillStyle = lite;
    ctx.fillRect(-s+2, -s+2, 1, 1);
    ctx.restore();
  }

  function drawIceE(e, x, y, slow) {
    const s = e.size;
    ctx.save(); ctx.translate(x, y); ctx.rotate(e.rotation * 0.4);
    const base = slow ? '#557588' : '#5a7488';
    const edge = slow ? '#2a4a5e' : '#2a3e50';
    // 다이아몬드 (얼음 결정)
    ctx.fillStyle = base;
    ctx.beginPath();
    ctx.moveTo(0, -s); ctx.lineTo(s, 0);
    ctx.lineTo(0, s); ctx.lineTo(-s, 0);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = edge; ctx.lineWidth = 1; ctx.stroke();
    // 중심 작은 흰 점
    ctx.fillStyle = '#cce0ee';
    ctx.fillRect(-1, -1, 2, 2);
    ctx.restore();
  }

  function drawDroneE(e, x, y, slow) {
    const s = e.size;
    ctx.save(); ctx.translate(x, y);
    const wobble = Math.sin(state.t * 0.12 + e.seed) * 0.04;
    ctx.rotate(wobble);
    const base = slow ? '#4a6878' : '#555a64';
    const edge = slow ? '#1f3a48' : '#2a2e36';
    // 본체 + 외곽
    ctx.fillStyle = edge;
    ctx.fillRect(-s, -s+1, s*2, s*2-2);
    ctx.fillStyle = base;
    ctx.fillRect(-s+1, -s+2, s*2-2, s*2-4);
    // 빨간 눈 (펄스 — 드론의 정체성)
    const pulse = 0.5 + 0.5 * Math.sin(state.t * 0.22 + e.seed);
    ctx.fillStyle = slow ? `rgba(120, 180, 255, ${0.6 + pulse * 0.4})` : `rgba(255, 80, 80, ${0.6 + pulse * 0.4})`;
    ctx.fillRect(-1, -1, 2, 2);
    ctx.restore();
  }

  function drawPlasmaE(e, x, y, slow) {
    const s = e.size;
    ctx.save(); ctx.translate(x, y);
    const pulse = 1 + Math.sin(state.t * 0.14 + e.seed) * 0.08;
    const base = slow ? '#586278' : '#6a5078';
    // 옅은 글로우
    ctx.fillStyle = slow ? 'rgba(88, 98, 120, 0.25)' : 'rgba(106, 80, 120, 0.28)';
    ctx.beginPath(); ctx.arc(0, 0, (s + 2) * pulse, 0, Math.PI*2); ctx.fill();
    // 본체 (원)
    ctx.fillStyle = base;
    ctx.beginPath(); ctx.arc(0, 0, s * pulse, 0, Math.PI*2); ctx.fill();
    // 코어 (흰점)
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-1, -1, 2, 2);
    ctx.restore();
  }

  function drawCrystalE(e, x, y, slow) {
    const s = e.size;
    ctx.save(); ctx.translate(x, y); ctx.rotate(e.rotation * 0.3);
    const base = slow ? '#4a7080' : '#3e7060';
    const edge = slow ? '#244850' : '#1a3a30';
    // 6각형
    ctx.fillStyle = base;
    ctx.beginPath();
    for (let k = 0; k < 6; k++) {
      const a = (Math.PI * 2 / 6) * k - Math.PI / 2;
      const px = Math.cos(a) * s;
      const py = Math.sin(a) * s;
      if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = edge; ctx.lineWidth = 1; ctx.stroke();
    // 중심 점
    ctx.fillStyle = '#ddeae0';
    ctx.fillRect(-1, -1, 2, 2);
    ctx.restore();
  }

  function drawBossE(e, x, y, slow) {
    const s = e.size;
    ctx.save(); ctx.translate(x, y); ctx.rotate(e.rotation);
    // 외곽 펄스 오라 (덜 강하게)
    const pulse = 1 + Math.sin(state.t * 0.09) * 0.12;
    ctx.fillStyle = slow ? 'rgba(120, 180, 240, 0.18)' : 'rgba(220, 50, 80, 0.22)';
    ctx.beginPath(); ctx.arc(0, 0, s + 6 * pulse, 0, Math.PI*2); ctx.fill();
    // 색상 (덜 강한 채도)
    const base = slow ? '#385878' : '#601a28';
    const edge = slow ? '#1c2d44' : '#2a0a12';
    const accent = slow ? '#c8dceb' : '#ff8090';
    // 8각형 본체
    ctx.fillStyle = base;
    ctx.beginPath();
    ctx.moveTo(-s+4, -s); ctx.lineTo(s-4, -s);
    ctx.lineTo(s, -s+4); ctx.lineTo(s, s-4);
    ctx.lineTo(s-4, s); ctx.lineTo(-s+4, s);
    ctx.lineTo(-s, s-4); ctx.lineTo(-s, -s+4);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = edge; ctx.lineWidth = 1.5; ctx.stroke();
    // 중앙 다이아몬드 (단일 강력 액센트)
    ctx.fillStyle = accent;
    ctx.beginPath();
    ctx.moveTo(0, -5); ctx.lineTo(5, 0);
    ctx.lineTo(0, 5); ctx.lineTo(-5, 0);
    ctx.closePath(); ctx.fill();
    // 내부 작은 코어
    ctx.fillStyle = edge;
    ctx.fillRect(-2, -2, 4, 4);
    // 4방향 짧은 스파이크 (세련된 미니멀)
    ctx.fillStyle = base;
    ctx.fillRect(-1.5, -s-3, 3, 3);
    ctx.fillRect(-1.5, s, 3, 3);
    ctx.fillRect(-s-3, -1.5, 3, 3);
    ctx.fillRect(s, -1.5, 3, 3);
    ctx.restore();
  }

  function drawEnemies() {
    for (const e of state.enemies) {
      // 회전 업데이트 (개체별 rotSpeed 적용)
      e.rotation = (e.rotation || 0) + (e.rotSpeed || 0);
      const [x, y] = enemyXY(e);
      const slow = e.slowFrames > 0;
      // 타입별 디스패치
      if (e.isBoss)               drawBossE(e, x, y, slow);
      else if (e.type === 'ice')  drawIceE(e, x, y, slow);
      else if (e.type === 'drone')   drawDroneE(e, x, y, slow);
      else if (e.type === 'plasma')  drawPlasmaE(e, x, y, slow);
      else if (e.type === 'crystal') drawCrystalE(e, x, y, slow);
      else                        drawAsteroidE(e, x, y, slow);
      // HP 바
      if (e.hp < e.maxHp) {
        const w = e.size*2;
        ctx.fillStyle = '#3a1418'; ctx.fillRect(x - e.size, y - e.size - 5, w, 2);
        ctx.fillStyle = e.isBoss ? '#ff3355' : '#ff8a98';
        ctx.fillRect(x - e.size, y - e.size - 5, w * (e.hp/e.maxHp), 2);
      }
      // 특수 행동 표시 (작은 아이콘)
      if (e.behavior === 'shielded' && e.shieldHp > 0) {
        ctx.strokeStyle = `rgba(136, 204, 255, ${0.4 + 0.3 * Math.sin(state.t * 0.15)})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(x, y, e.size + 4, 0, Math.PI*2); ctx.stroke();
      } else if (e.behavior === 'regen') {
        ctx.fillStyle = '#88ff88';
        ctx.fillRect(x - 5, y - e.size - 10, 10, 1);  // + 표시
        ctx.fillRect(x - 1, y - e.size - 12, 2, 5);
      } else if (e.behavior === 'splitter' && !e.isChild) {
        ctx.fillStyle = '#ffaa66';
        ctx.fillRect(x - 4, y - e.size - 10, 1, 3);
        ctx.fillRect(x + 3, y - e.size - 10, 1, 3);
        ctx.fillRect(x - 1, y - e.size - 10, 2, 3);
      } else if (e.behavior === 'charger') {
        ctx.fillStyle = '#ff6666';
        ctx.fillRect(x - 3, y - e.size - 9, 6, 2);  // 빠름 표시
      }
    }
  }
  function drawBossUI() {
    const boss = state.enemies.find(e => e.isBoss);
    if (!boss) return;
    const w = 320, h = 14;
    const x = (W - w) / 2, y = 16;
    ctx.fillStyle = '#1a0a10'; ctx.fillRect(x - 2, y - 2, w + 4, h + 4);
    ctx.fillStyle = '#ee2244'; ctx.fillRect(x, y, w * (boss.hp / boss.maxHp), h);
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.font = 'bold 11px Consolas, monospace';
    ctx.fillText(`BOSS  ${boss.hp} / ${boss.maxHp}`, W/2, y + 10);
    ctx.textAlign = 'start';
  }
  function drawBullets() {
    for (const b of state.bullets) {
      const s = b.size || 2;
      const col = b.color || '#a0b8d8';
      // 옅은 색 글로우 (능력 색을 미세하게만 — 시선 분산 방지)
      if (b.glow) {
        ctx.globalAlpha = 0.30;
        ctx.fillStyle = col;
        ctx.fillRect(b.x - s*2, b.y - s*2, s*4, s*4);
        ctx.globalAlpha = 1;
      }
      // 색 외곽 (작게)
      ctx.fillStyle = col;
      ctx.fillRect(b.x - s, b.y - s, s*2, s*2);
      // 흰 코어 (모든 탄환에 — 통일감)
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(b.x - 1, b.y - 1, 2, 2);
    }
  }
  function drawAbilities() {
    for (const ab of state.tower.abilities) {
      const def = ABILITY_DEFS[ab.id];
      if (def.draw) def.draw(ab);
    }
  }
  function drawParticles() {
    for (const p of state.particles) {
      ctx.globalAlpha = Math.max(0, p.life / 20);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x-1, p.y-1, 2, 2);
    }
    ctx.globalAlpha = 1;
  }
  function drawComboFlash() {
    if (state.comboFlash <= 0) return;
    const a = state.comboFlash / 30;
    ctx.fillStyle = state.comboFlashColor;
    ctx.globalAlpha = a * 0.28;  // 절반 이하로 — 화면 안 가림
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
  function drawOverlay() {
    if (paused && !state.gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.font='28px Consolas, monospace';
      ctx.fillText('PAUSED', CX, CY - 10);
      ctx.font='14px Consolas, monospace'; ctx.fillText('Space 로 재개', CX, CY + 20);
      ctx.textAlign='start';
    }
    if (state.gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
      if (state.gameWin) {
        ctx.fillStyle = '#ffe070'; ctx.textAlign='center'; ctx.font='36px Consolas, monospace';
        ctx.fillText('VICTORY', CX, CY - 40);
      } else {
        ctx.fillStyle = '#ff8a98'; ctx.textAlign='center'; ctx.font='36px Consolas, monospace';
        ctx.fillText('GAME OVER', CX, CY - 40);
      }
      if (state.gameOverReason) {
        ctx.fillStyle = state.gameWin ? '#fff080' : '#ffaaaa';
        ctx.font='14px Consolas, monospace';
        ctx.fillText(state.gameOverReason, CX, CY - 12);
      }
      ctx.fillStyle = '#fff'; ctx.font='16px Consolas, monospace';
      const lastRound = state.gameWin ? MAX_ROUND : state.round;
      ctx.fillText(`도달 라운드: ${lastRound}   점수: ${state.score.toLocaleString()}`, CX, CY + 14);
      let lineY = CY + 38;
      if (state.stardustEarned) {
        ctx.fillStyle = '#ffd479'; ctx.font='14px Consolas, monospace';
        ctx.fillText(`+${state.stardustEarned} ★ 스타더스트 획득`, CX, lineY);
        lineY += 18;
      }
      if (state.achievementsEarned && state.achievementsEarned.length > 0) {
        ctx.fillStyle = '#52e07a'; ctx.font='12px Consolas, monospace';
        ctx.fillText(`🏅 신규 업적 ${state.achievementsEarned.length}개 (+${state.achievementStardust} ★)`, CX, lineY);
        lineY += 16;
        for (const ach of state.achievementsEarned.slice(0, 3)) {
          ctx.fillStyle = '#aaffaa'; ctx.font='10px Consolas, monospace';
          ctx.fillText(`· ${ach.name}: ${ach.desc}`, CX, lineY);
          lineY += 13;
        }
      }
      if (state.repeatStardust > 0) {
        ctx.fillStyle = '#88ccff'; ctx.font='12px Consolas, monospace';
        ctx.fillText(`🔁 반복 업적: +${state.repeatStardust} ★`, CX, lineY);
        lineY += 16;
      }
      ctx.fillStyle = '#fff'; ctx.font='14px Consolas, monospace';
      ctx.fillText('R = 다시 시작 · 🏠 메뉴 버튼', CX, lineY + 8);
      ctx.textAlign='start';
    }
  }
  function render() {
    ctx.clearRect(0,0,W,H);
    // 배경 — 흔들림 영향 없음 (별/행성/성운 안정)
    drawBackground();

    // 게임 월드 — 흔들림 적용 (타워/적/탄환/파티클/데미지 숫자)
    const sk = state.shakeStrength;
    if (sk > 0.1) {
      ctx.save();
      ctx.translate((Math.random() - 0.5) * sk, (Math.random() - 0.5) * sk);
    }
    drawArena();
    drawTower();
    drawEnemies();
    drawAbilities();
    drawBullets();
    drawParticles();
    drawDamageNumbers();
    if (sk > 0.1) ctx.restore();

    // UI / 오버레이 — 안정 (콤보 플래시, 카드, 보스 HP, 게임오버)
    drawComboFlash();
    drawComboReveal();
    drawWaveClear();
    drawBossUI();
    drawOverlay();
    drawLevelUpModal();
  }
  function drawDamageNumbers() {
    ctx.textAlign = 'center';
    for (const d of state.damageNumbers) {
      const a = Math.min(1, d.life / 30);
      ctx.globalAlpha = a;
      ctx.font = `bold ${d.size}px Consolas, monospace`;
      ctx.fillStyle = '#000';
      ctx.fillText(d.text, d.x + 1, d.y + 1);
      ctx.fillStyle = d.color;
      ctx.fillText(d.text, d.x, d.y);
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'start';
  }
  function drawWaveClear() {
    const w = state.waveClearText;
    if (!w) return;
    const total = 70;
    const t = (total - w.life) / total;
    let scale = 1, alpha = 1;
    if (t < 0.2) { scale = t / 0.2; alpha = scale; }
    else if (t > 0.7) { alpha = 1 - (t - 0.7) / 0.3; }
    ctx.save();
    ctx.translate(CX, CY - 80);
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffe070';
    ctx.font = 'bold 30px Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`R${w.round} CLEAR!`, 0, 0);
    ctx.fillStyle = '#fff';
    ctx.font = '14px Consolas, monospace';
    ctx.fillText(`+${w.bonus.toLocaleString()} (${w.timeSaved.toFixed(1)}s 단축)`, 0, 22);
    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.textAlign = 'start';
  }
  function drawComboReveal() {
    const cr = state.comboReveal;
    if (!cr) return;
    const def = ABILITY_DEFS[cr.id];
    if (!def) return;
    const total = 60;
    const t = (total - cr.life) / total;
    let scale, alpha;
    if (t < 0.25) {           // pop in
      scale = t / 0.25;
      alpha = scale;
    } else if (t < 0.75) {    // hold
      scale = 1 + Math.sin((t - 0.25) * 6) * 0.04;
      alpha = 1;
    } else {                  // fade out
      scale = 1;
      alpha = 1 - (t - 0.75) / 0.25;
    }
    ctx.save();
    ctx.translate(CX, CY);
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;
    // 카드
    const cw = 260, ch = 100;
    ctx.fillStyle = '#0b0d12';
    ctx.fillRect(-cw/2, -ch/2, cw, ch);
    ctx.strokeStyle = def.color;
    ctx.lineWidth = 3;
    ctx.strokeRect(-cw/2, -ch/2, cw, ch);
    // 위 라벨
    ctx.fillStyle = '#ffd479';
    ctx.font = 'bold 12px Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('✨ 조합 완성 ✨', 0, -ch/2 + 18);
    // 이름
    ctx.fillStyle = def.color;
    ctx.font = 'bold 24px Consolas, monospace';
    ctx.fillText(def.name, 0, 8);
    // 설명
    ctx.fillStyle = '#c8cdd8';
    ctx.font = '11px Consolas, monospace';
    ctx.fillText(def.desc(cr.level || 1), 0, ch/2 - 14);
    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.textAlign = 'start';
  }
  // 카드 4티어 색상 팔레트 (능력별 색 X — 티어별 통합)
  const CARD_TIERS = {
    new: {
      bg1: '#1c1e26', bg2: '#0a0c14',
      border: '#e6e6ec', name: '#ffffff',
      accent: '#c0c4cc', glow: null,
      label: '⭐ NEW',
    },
    upgrade: {
      bg1: '#1a3050', bg2: '#0a1424',
      border: '#88c8ff', name: '#cce8ff',

      label: '▲ UPGRADE',
    },
    combo: {
      bg1: '#3a1e58', bg2: '#180824',
      border: '#c084ff', name: '#e0c0ff',
      accent: '#c084ff', glow: 'rgba(192, 132, 255, 0.30)',
      label: '✦ 조합!',

    triple: {
      // 세련된 와인 레드 (딥 크림슨)

      border: '#88dda8', name: '#bcf0d2',

      accent: '#ffd479', glow: 'rgba(255, 212, 121, 0.30)',

  function getCardTier(c) {
    if (c.action === 'level') return 'upgrade';
    if (c.action === 'combo') return c.tier === 3 ? 'triple' : 'combo';
    if (c.action === 'bonusScore') return 'bonusScore';
    if (c.action === 'bonusStardust') return 'bonusStardust';

  function drawLevelUpModal() {
    if (!state.levelUpChoices) return;
    ctx.fillStyle = 'rgba(0,0,0,0.80)';
    ctx.fillRect(0, 0, W, H);
    // 제목
    const isRandom = state.cardCost > 0;
    ctx.fillStyle = isRandom ? '#ffd479' : '#ffe070';
    ctx.font = 'bold 22px Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(isRandom ? '🎲 카드 선택' : `LEVEL ${state.playerLevel} UP!`, CX, 70);
    ctx.fillStyle = '#9aa3b3';
    ctx.font = '11px Consolas, monospace';
    ctx.fillText(isRandom ? `선택 시 ${state.cardCost}G 차감` : '3장 중 하나를 선택하세요', CX, 90);

    const cardW = 175, cardH = 240, gap = 12;
    const totalW = cardW * 3 + gap * 2;
    const startX = (W - totalW) / 2;
    const cardY = (H - cardH) / 2 - 10;
    const ownedIds = new Set(state.tower.abilities.map(a => a.id));

    for (let i = 0; i < state.levelUpChoices.length; i++) {
      const c = state.levelUpChoices[i];
      const def = ABILITY_DEFS[c.id];  // 보너스 카드는 def 없음
      const tier = getCardTier(c);
      const p = CARD_TIERS[tier];
      const x = startX + i * (cardW + gap);
      const y = cardY;
      const isBonus = c.action === 'bonusScore' || c.action === 'bonusStardust';

      // 외곽 글로우 (티어가 좋을수록 강함)

        ctx.fillStyle = p.glow;

      }
      // 살짝 펄스하는 트리플
      if (tier === 'triple') {
        const pulse = 0.5 + 0.5 * Math.sin(state.t * 0.12);
        ctx.fillStyle = `rgba(255, 208, 96, ${0.15 + pulse * 0.15})`;
        ctx.fillRect(x - 12, y - 12, cardW + 24, cardH + 24);

      // 카드 배경 (그라데이션)

      ctx.fillRect(x, y, cardW, 3);

      // 티어 라벨

      ctx.font = 'bold 11px Consolas, monospace';

        ctx.fillText(kindTag, x + cardW/2, y + 40);
      }

      // 이름 (티어 색) — 보너스는 금액 표기

      if (isBonus) {

      } else if (c.action === 'level') {
        ctx.fillStyle = p.accent;
        ctx.font = '11px Consolas, monospace';
        ctx.fillText(`Lv${c.level} → Lv${c.newLevel}`, x + cardW/2, y + 82);
        nextLineY = y + 102;
      } else if (c.action === 'combo' && c.parts) {
        // 재료 (소진될 능력 2개)
        const p1 = ABILITY_DEFS[c.parts[0]];
        const p2 = ABILITY_DEFS[c.parts[1]];
        if (p1 && p2) {
          ctx.fillStyle = p.accent;
          ctx.font = '10px Consolas, monospace';
          ctx.fillText('재료 ↓', x + cardW/2, y + 82);
          ctx.fillStyle = '#c8cdd8';
          ctx.font = 'bold 10px Consolas, monospace';
          ctx.fillText(`${p1.name} + ${p2.name}`, x + cardW/2, y + 96);
          ctx.fillStyle = p.accent;
          ctx.font = '9px Consolas, monospace';
          ctx.fillText('(MAX 재료 소진)', x + cardW/2, y + 109);
          nextLineY = y + 126;
        }
      }

      // 설명 (자동 줄바꿈) — 보너스 카드는 별도 처리됨, 스킵
      let lineY = nextLineY;
      if (!isBonus && def) {
        ctx.fillStyle = '#c8cdd8';
        ctx.font = '10px Consolas, monospace';
        const desc = def.desc(c.newLevel || c.level || 1);
        const words = desc.split(' ');
        let line = '';
        for (const w of words) {
          const testLine = line ? line + ' ' + w : w;
          if (ctx.measureText(testLine).width > cardW - 18) {
            ctx.fillText(line, x + cardW/2, lineY);
            line = w;
            lineY += 13;
          } else line = testLine;
        }
        if (line) { ctx.fillText(line, x + cardW/2, lineY); lineY += 13; }
      }

      // 조합 힌트 — 보너스 카드는 표시 안 함
      const partners = (!isBonus && c.id) ? (COMBO_PARTNERS[c.id] || []) : [];
      if (partners.length > 0) {
        // 구분선
        ctx.strokeStyle = `rgba(255,255,255,0.08)`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x + 14, lineY + 4);
        ctx.lineTo(x + cardW - 14, lineY + 4);
        ctx.stroke();
        lineY += 16;
        let shown = 0;
        for (const pp of partners) {
          if (shown >= 3) break;
          const pdef = ABILITY_DEFS[pp.partner];
          const cdef = ABILITY_DEFS[pp.combo];
          if (!pdef || !cdef) continue;
          const has = ownedIds.has(pp.partner);
          const isTrip = pp.tier === 3;
          // 보유 시 강조 색
          ctx.fillStyle = has
            ? (isTrip ? '#ffd060' : '#c084ff')
            : '#5a6068';
          ctx.font = (has ? 'bold ' : '') + '9px Consolas, monospace';
          const tag = isTrip ? '🔥' : (cdef.isCombo && pdef.isPassive ? '⚙' : '+');
          const hint = `${tag} ${pdef.name} → ${cdef.name}`;
          let txt = hint;
          while (ctx.measureText(txt).width > cardW - 14 && txt.length > 8) txt = txt.slice(0, -1);
          if (txt !== hint) txt = txt.slice(0, -1) + '…';
          ctx.fillText(txt, x + cardW/2, lineY);
          lineY += 12;
          shown++;
        }
      }

      // 하단 번호 키
      ctx.fillStyle = p.accent;
      ctx.font = 'bold 13px Consolas, monospace';
      ctx.fillText(`[${i + 1}]`, x + cardW/2, y + cardH - 12);
    }

    // 취소 버튼
    if (state.cardCancelable) {
      const bx = CX - 60, by = cardY + cardH + 18, bw = 120, bh = 38;
      ctx.fillStyle = '#1a1f2b';
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = '#3a4256';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, bw, bh);
      ctx.fillStyle = '#c8cdd8';
      ctx.font = '13px Consolas, monospace';
      ctx.fillText('취소 [ESC]', CX, by + 24);
      state._cancelBtn = { x: bx, y: by, w: bw, h: bh };
    } else state._cancelBtn = null;
    ctx.textAlign = 'start';
  }

      const def = ABILITY_DEFS[a.id];
      // 조합 힌트 (다중 파트너 지원)

      let nameColor = def.color;
      if (def.isCombo) {
        // 조합 능력은 그냥 자기 색

        const ownedSet = new Set(state.tower.abilities.map(x => x.id));
        const partners = COMBO_PARTNERS[a.id].slice(0, 2);  // 최대 2개 힌트
        const hints = partners.map(p => {
          const pdef = ABILITY_DEFS[p.partner];
          const cdef = ABILITY_DEFS[p.combo];

          const has = ownedSet.has(p.partner);
          const c = has ? '#52e07a' : '#6b7283';
          return `<small style="color:${c}">+ ${pdef.name} → ${cdef.name}</small>`;

        comboHint = hints.join('');

      const max = isAtMax(a);
      const lvLabel = max
        ? `<span style="color:#ffd479">MAX</span>`

      row.className = 'ability-row';
      row.innerHTML = `
        <div class="ability-name">
          <b style="color:${nameColor}">${def.name} ${lvLabel}</b>

          ${comboHint}

        ${upBtn}

    elAb.querySelectorAll('button').forEach(btn => {

        return;

  function fitScale() {
    if (wrapEl.style.display === 'none') return;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const usePortrait = vh > vw * 1.05;
    const wasPortrait = wrapEl.classList.contains('portrait');
    wrapEl.classList.toggle('portrait', usePortrait);
    if (usePortrait && !wasPortrait) collapseAbilities(true, false);
    else if (!usePortrait && wasPortrait) collapseAbilities(false, false);
    wrapEl.style.transform = 'none';
    const rect = wrapEl.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;
    const pad = 16;
    const scale = Math.min((vw - pad) / rect.width, (vh - pad) / rect.height, 1.8);
    wrapEl.style.transform = `scale(${scale})`;
    // 절대 위치 능력창의 bottom anchor 갱신 (panel layout이 안정된 후)
    positionAbilitiesAnchor();
  }

  // 단순히 .expanded 클래스만 토글 → transform: translateY transition으로 슬라이드 업/다운.
  function collapseAbilities(collapsed, _animate = true) {

  function positionAbilitiesAnchor() {

  // ===== 사운드 시스템 (Web Audio API — 파일 없이 합성) =====
  let audioCtx = null;
  let sfxEnabled = true;
  function ensureAudio() {
    if (audioCtx) return audioCtx;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch { audioCtx = null; }
    return audioCtx;
  }
  // 사용자 첫 입력 후 audio context 잠금 해제 (iOS Safari 등)
  function unlockAudio() {
    const ctx = ensureAudio();
    if (ctx && ctx.state === 'suspended') ctx.resume();
    window.removeEventListener('pointerdown', unlockAudio);
    window.removeEventListener('keydown', unlockAudio);
  }
  window.addEventListener('pointerdown', unlockAudio, { once: false });
  window.addEventListener('keydown', unlockAudio, { once: false });

  function tone(opts) {
    if (!sfxEnabled) return;
    const ctx = ensureAudio();
    if (!ctx) return;
    const {
      freq = 440, freqEnd = freq, dur = 0.1, type = 'square',
      vol = 0.15, attack = 0.005, decay = 0.05,
    } = opts;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);
    osc.frequency.exponentialRampToValueAtTime(Math.max(0.01, freqEnd), now + dur);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(vol, now + attack);
    gain.gain.linearRampToValueAtTime(0.0001, now + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + dur + decay);
  }
  function noise(opts) {
    if (!sfxEnabled) return;
    const ctx = ensureAudio();
    if (!ctx) return;
    const { dur = 0.15, vol = 0.18, hpf = 200 } = opts || {};
    const now = ctx.currentTime;
    const bufSize = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = hpf;
    const gain = ctx.createGain();
    gain.gain.value = vol;
    src.connect(filter).connect(gain).connect(ctx.destination);
    src.start(now);
  }

  // 게임 이벤트별 SFX

  // ===== 도감 해금 (영구 저장) =====
  // 플레이 중 획득한 기본 능력 + 형성된 조합 능력만 도감에서 볼 수 있음.
  const UNLOCKED_KEY = 'dot-defense-unlocked';
  function loadUnlocked() {
    try {
      const raw = localStorage.getItem(UNLOCKED_KEY);
      return new Set(raw ? JSON.parse(raw) : []);
    } catch { return new Set(); }
  }

  };
  document.getElementById('recordsBack').onclick = () => showScreen('menu');
  document.getElementById('recordDetailBack').onclick = () => showScreen('records');
  document.getElementById('shopBtn').onclick = () => { buildShop(); showScreen('shop'); };
  document.getElementById('shopBack').onclick = () => showScreen('menu');
  document.getElementById('characterBtn').onclick = () => { buildCharacterList(); showScreen('character'); };
  document.getElementById('characterBack').onclick = () => showScreen('menu');
  document.getElementById('achievementsBtn').onclick = () => { buildAchievements(); showScreen('achievements'); };
  document.getElementById('achievementsBack').onclick = () => showScreen('menu');

  // 개발용: 데이터 초기화 — localStorage 전체 비움
  document.getElementById('resetDataBtn').onclick = () => {
    const ok = confirm('⚠ 모든 저장 데이터를 삭제합니다.\n\n• 스타더스트, 강화소 진행\n• 도감 / 업적 / 기록\n• 캐릭터 선택, 반복 업적 카운트\n\n진행할까요?');
    if (!ok) return;
    try { localStorage.clear(); } catch {}
    location.reload();
  };

  function buildAchievements() {
    const list = document.getElementById('achievements-list');
    list.innerHTML = '';
    const have = getUnlockedAchievements();
    const singleDust = ACHIEVEMENTS.reduce((acc, a) => acc + (have.has(a.id) ? a.reward : 0), 0);
    const repeatCounts = META.repeatCounts || {};
    const repeatDust = REPEAT_ACHIEVEMENTS.reduce((acc, a) => acc + (repeatCounts[a.id] || 0) * a.reward, 0);
    // 요약
    document.getElementById('achievement-summary').innerHTML =
      `단발 <b>${have.size}/${ACHIEVEMENTS.length}</b> · 누적 획득 <b>${singleDust + repeatDust}★</b> (단발 ${singleDust} + 반복 ${repeatDust})`;

    // ── 단발 업적 섹션 ──
    const singleHeader = document.createElement('div');
    singleHeader.className = 'ach-section-header';
    singleHeader.textContent = '✦ 단발 업적 (한 번만)';
    list.appendChild(singleHeader);
    for (const ach of ACHIEVEMENTS) {
      const isUL = have.has(ach.id);
      const card = document.createElement('div');
      card.className = 'achievement-card' + (isUL ? ' unlocked' : '');
      const chips = [];
      if (ach.reward) chips.push(`<span class="ach-reward stardust">+${ach.reward} ★</span>`);
      if (ach.unlocks) {
        if (ach.unlocks.character) {
          const ch = CHARACTERS[ach.unlocks.character];
          if (ch) chips.push(`<span class="ach-reward character">👤 ${ch.name}</span>`);
        }
        if (ach.unlocks.ability) {
          const ab = ABILITY_DEFS[ach.unlocks.ability];
          if (ab) chips.push(`<span class="ach-reward ability">⚡ ${ab.name}</span>`);
        }
      }
      card.innerHTML = `
        <div class="ach-icon">${isUL ? '✓' : '🔒'}</div>
        <div class="ach-info">
          <div class="ach-name">${ach.name}</div>
          <div class="ach-desc">${ach.desc}</div>
          <div class="ach-rewards">${chips.join('')}</div>
        </div>
      `;
      list.appendChild(card);
    }

    // ── 반복 업적 섹션 ──
    const repeatHeader = document.createElement('div');
    repeatHeader.className = 'ach-section-header';
    repeatHeader.textContent = '🔁 반복 업적 (매 게임마다 가능)';
    list.appendChild(repeatHeader);
    for (const ach of REPEAT_ACHIEVEMENTS) {
      const count = repeatCounts[ach.id] || 0;
      const earned = count * ach.reward;
      const card = document.createElement('div');
      card.className = 'achievement-card repeat' + (count > 0 ? ' unlocked' : '');
      card.innerHTML = `
        <div class="ach-icon">🔁</div>
        <div class="ach-info">
          <div class="ach-name">${ach.name}</div>
          <div class="ach-desc">${ach.desc}</div>
          <div class="ach-rewards">
            <span class="ach-reward stardust">회당 +${ach.reward} ★</span>
            <span class="ach-reward count">달성 ${count}회 (${earned}★)</span>
          </div>
        </div>
      `;
      list.appendChild(card);
    }
  }

  function buildCharacterList() {
    const list = document.getElementById('character-list');
    list.innerHTML = '';
    for (const id of Object.keys(CHARACTERS)) {
      const char = CHARACTERS[id];
      const unlocked = isCharUnlocked(id);
      const selected = selectedCharacter === id;
      const card = document.createElement('div');
      card.className = 'char-card' + (unlocked ? '' : ' locked') + (selected ? ' selected' : '');
      card.style.borderLeftColor = char.color;
      // 잠긴 캐릭터는 어떤 업적으로 해금되는지 표시
      let lockText = '';
      if (!unlocked && char.unlockBy) {
        const ach = ACHIEVEMENTS.find(a => a.id === char.unlockBy);
        const achLabel = ach ? `${ach.name} (${ach.desc})` : char.unlockBy;
        lockText = `<div class="char-lock">🔒 업적 잠김: ${achLabel}</div>`;
      }
      const selText = selected ? `<div class="char-selected-tag">✓ 선택됨</div>` : '';
      // 잠긴 캐릭터도 시작 능력과 효과는 보여줘서 도전 동기 부여
      const startAbs = (char.startAbilities || []).map(aid => {
        const d = ABILITY_DEFS[aid];
        return d ? `<span style="color:${d.color}">${d.name}</span>` : aid;
      }).join(', ');
      const startInfo = startAbs ? `<div class="char-start">시작 능력: ${startAbs}</div>` : '';
      card.innerHTML = `
        <div class="char-name" style="color:${char.color}">${char.name}</div>
        <div class="char-desc">${char.desc}</div>
        ${startInfo}
        ${lockText}${selText}
      `;
      if (unlocked) {
        card.onclick = () => {
          selectedCharacter = id;
          META.selectedCharacter = id;
          saveMeta();
          SFX.click();
          buildCharacterList();
        };
      }
      list.appendChild(card);
    }
  }

  // 강화소 콘텐츠
  function buildShop() {
    document.getElementById('stardust-count').textContent = (META.stardust || 0).toLocaleString();
    const list = document.getElementById('shop-list');
    list.innerHTML = '';
    for (const up of META_UPGRADES) {
      const cur = metaLv(up.id);
      const maxed = cur >= up.maxLv;
      const cost = maxed ? null : up.cost(cur);
      const card = document.createElement('div');
      card.className = 'shop-card' + (maxed ? ' maxed' : '');
      let effectText = '';
      if (cur > 0 && up.apply) {
        const v = up.apply(cur);
        effectText = ' · 현재 효과: ' + (v >= 1 ? '+' + Math.round(v) : '+' + Math.round(v * 100) + '%');
      }
      card.innerHTML = `
        <div>
          <div class="name">${up.name}</div>
          <div class="desc">${up.desc}</div>
          <div class="lv">Lv ${cur} / ${up.maxLv}${effectText}</div>
        </div>
        <button class="shop-buy${maxed ? ' maxed' : ''}" data-id="${up.id}" ${maxed || (META.stardust || 0) < cost ? 'disabled' : ''}>
          ${maxed ? 'MAX' : cost + ' ★'}
        </button>
      `;
      list.appendChild(card);
    }
    list.querySelectorAll('.shop-buy').forEach(btn => {
      btn.onclick = () => {
        if (buyUpgrade(btn.dataset.id)) buildShop();
      };
    });
  }

  // ===== 도감 콘텐츠 생성 =====
  let codexTab = 'basic';
  document.querySelectorAll('.codex-tab').forEach(btn => {
    btn.onclick = () => {
      codexTab = btn.dataset.tab;
      document.querySelectorAll('.codex-tab').forEach(x => x.classList.toggle('active', x === btn));
      buildCodex();
    };
  });
  function buildCodex() {
    const list = document.getElementById('codex-list');
    list.innerHTML = '';
    // 카테고리별 개수
    const activeBasicIds = ALL_ABILITY_IDS.filter(id => !ABILITY_DEFS[id].isCombo && !ABILITY_DEFS[id].isPassive);
    const passiveIds    = ALL_ABILITY_IDS.filter(id => !ABILITY_DEFS[id].isCombo &&  ABILITY_DEFS[id].isPassive);
    const comboIds  = ALL_ABILITY_IDS.filter(id => ABILITY_DEFS[id].isCombo && !ABILITY_DEFS[id].isTriple);
    const tripleIds = ALL_ABILITY_IDS.filter(id => ABILITY_DEFS[id].isTriple);
    const aUL = activeBasicIds.filter(id => unlockedAbilities.has(id)).length;
    const pUL = passiveIds.filter(id => unlockedAbilities.has(id)).length;
    const cUL = comboIds.filter(id => unlockedAbilities.has(id)).length;
    const tUL = tripleIds.filter(id => unlockedAbilities.has(id)).length;
    document.querySelector('.codex-tab[data-tab="basic"]').textContent = `액티브 ${aUL}/${activeBasicIds.length}`;
    document.querySelector('.codex-tab[data-tab="passive"]').textContent = `패시브 ${pUL}/${passiveIds.length}`;
    document.querySelector('.codex-tab[data-tab="combo"]').textContent = `조합 ${cUL}/${comboIds.length}`;
    document.querySelector('.codex-tab[data-tab="triple"]').textContent = `히든 ${tUL}/${tripleIds.length}`;

    for (const id of ALL_ABILITY_IDS) {
      const def = ABILITY_DEFS[id];
      if (codexTab === 'basic'   && (def.isCombo || def.isPassive)) continue;
      if (codexTab === 'passive' && (def.isCombo || !def.isPassive)) continue;
      if (codexTab === 'combo'   && (!def.isCombo || def.isTriple)) continue;
      if (codexTab === 'triple'  && !def.isTriple) continue;
      const card = document.createElement('div');
      card.className = 'codex-card';
      if (!unlockedAbilities.has(id)) {
        // 잠긴 카드 — 정보 가림
        card.classList.add('locked');
        card.innerHTML = `
          <div class="name">🔒 ? ? ?</div>
          <div class="desc">플레이하며 획득하면 해금됩니다.</div>
        `;
        list.appendChild(card);
        continue;
      }
      // 해금된 카드 — 정보 노출
      card.style.borderLeftColor = def.color;
      let extra = '';
      if (def.isCombo) {
        const recipe = COMBO_RECIPES.find(r => r.combo === id);
        if (recipe) {
          const a = ABILITY_DEFS[recipe.parts[0]];
          const b = ABILITY_DEFS[recipe.parts[1]];
          const tierLabel = def.isTriple ? '🔥 트리플 재료: ' : '재료: ';
          extra = `<div class="recipe">${tierLabel}<span style="color:${a.color}">${a.name}</span> + <span style="color:${b.color}">${b.name}</span><br/><small style="color:#7a8090">두 재료 MAX 도달 시 카드 등장</small></div>`;
        }
      } else if (COMBO_PARTNERS[id] && COMBO_PARTNERS[id].length > 0) {
        // 다중 파트너 — 한 능력이 여러 조합 가능
        const lines = COMBO_PARTNERS[id].map(p => {
          const partner = ABILITY_DEFS[p.partner];
          const combo = ABILITY_DEFS[p.combo];
          if (!partner || !combo) return '';
          const pName = unlockedAbilities.has(p.partner)
            ? `<span style="color:${partner.color}">${partner.name}</span>`
            : `<span style="color:#4a5163">???</span>`;
          const cName = unlockedAbilities.has(p.combo)
            ? `<span style="color:${combo.color}">${combo.name}</span>`
            : `<span style="color:#4a5163">???</span>`;
          const tag = p.tier === 3 ? '🔥' : '+';
          return `<div>${tag} ${pName} → ${cName}</div>`;
        }).filter(Boolean).join('');
        extra = `<div class="recipe">${lines}</div>`;
      }
      card.innerHTML = `
        <div class="name" style="color:${def.color}">${def.name}</div>
        <div class="desc">${def.desc(1)}</div>
        ${extra}
      `;
      list.appendChild(card);
    }
  }

  // ===== 기록 화면 콘텐츠 =====
  let selectedRecord = null;
  function buildRecords() {
    const list = document.getElementById('records-list');
    list.innerHTML = '';
    const records = loadRecords();
    if (records.length === 0) {
      list.innerHTML = '<div class="record-empty">아직 기록이 없습니다.<br/>게임을 플레이해서 첫 기록을 남겨보세요!</div>';
      return;
    }
    records.forEach((rec, i) => {
      const card = document.createElement('div');
      card.className = 'record-card' + (rec.win ? ' win' : '');
      const d = new Date(rec.date);
      const dateStr = `${String(d.getFullYear()).slice(2)}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      const roundLabel = rec.win ? '🏆 100라운드 클리어' : `도달 R${rec.round}`;
      card.innerHTML = `
        <div class="rank">${i + 1}</div>
        <div class="info">
          <div class="score">${rec.score.toLocaleString()} 점</div>
          <div class="meta">${roundLabel} · ${dateStr}</div>
        </div>
        <div class="arrow">→</div>
      `;
      card.onclick = () => {
        selectedRecord = rec;
        buildRecordDetail();
        showScreen('recordDetail');
      };
      list.appendChild(card);
    });
  }
  function buildRecordDetail() {
    const content = document.getElementById('record-detail-content');
    content.innerHTML = '';
    const rec = selectedRecord;
    if (!rec) return;
    const d = new Date(rec.date);
    const fullDate = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const header = document.createElement('div');
    header.id = 'record-detail-header';
    if (rec.win) header.className = 'win';
    header.innerHTML = `
      <div class="big-score">${rec.score.toLocaleString()} 점</div>
      <div class="sub">${rec.win ? '🏆 100라운드 클리어' : `도달 라운드: ${rec.round}`}</div>
      <div class="when">${fullDate}</div>
    `;
    content.appendChild(header);
    const title = document.createElement('h3');
    title.style.cssText = 'margin: 0 0 12px; font-size: 14px; color: #9aa3b3; letter-spacing: 2px;';
    title.textContent = `사용한 능력 (${(rec.abilities || []).length})`;
    content.appendChild(title);
    const abList = document.createElement('div');
    abList.id = 'record-detail-abilities';
    if (!rec.abilities || rec.abilities.length === 0) {
      abList.innerHTML = '<div class="record-empty">사용한 능력 없음</div>';
    } else {
      for (const a of rec.abilities) {
        const def = ABILITY_DEFS[a.id];
        if (!def) continue;
        const card = document.createElement('div');
        card.className = 'codex-card';
        card.style.borderLeftColor = def.color;
        let recipeInfo = '';
        if (def.isCombo) {
          const recipe = COMBO_RECIPES.find(r => r.combo === a.id);
          if (recipe) {
            const p1 = ABILITY_DEFS[recipe.parts[0]];
            const p2 = ABILITY_DEFS[recipe.parts[1]];
            recipeInfo = `<div class="recipe">재료: <span style="color:${p1.color}">${p1.name}</span> + <span style="color:${p2.color}">${p2.name}</span></div>`;
          }
        }
        card.innerHTML = `
          <div class="name" style="color:${def.color}">${def.name} <span style="color:#9bb3ff">Lv${a.level}</span></div>
          <div class="desc">${def.desc(a.level)}</div>
          ${recipeInfo}
        `;
        abList.appendChild(card);
      }
    }
    content.appendChild(abList);
  }

  // ===== 시작 =====
  // 게임은 startBtn 클릭 시 reset() 호출됨. 여기서는 메뉴만 표시.
  reset();              // state 초기 구조만 만들어둠 (loop이 안전하게 동작하도록)
  initBackground();     // 우주 배경 초기화 (별/행성/성운)
  (function loop(){
    if (currentScreen === 'game') {
      const steps = paused || state.gameOver ? 1 : gameSpeed;
      for (let i = 0; i < steps; i++) update();
      render();
    }
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
