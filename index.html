<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0b0d12" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<link rel="icon" href="./icons/icon-192.png" />
<title>Dot Defense</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0b0d12; color: #e8eaf0;
    font-family: ui-monospace, Consolas, "Courier New", monospace;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    /* 노치/홈 인디케이터 안전 영역 */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
  }
  #wrap { display: flex; gap: 12px; }
  /* 세로 모드: 패널을 캔버스 아래로 쌓고 터치 친화적으로 크게 */
  #wrap.portrait { flex-direction: column; }
  #wrap.portrait #panel {
    width: 644px; height: auto;
    font-size: 15px;
    padding: 16px;
    gap: 12px;
  }
  /* 능력 행 높이를 고정해서 빈 슬롯/채워진 슬롯 관계없이 패널 크기가 일정 (몰입 유지) */
  .ability-row { min-height: 50px; box-sizing: border-box; }
  #wrap.portrait .ability-row { padding: 10px 12px; min-height: 82px; }
  #wrap.portrait .ability-row button { padding: 12px 14px; font-size: 14px; min-height: 44px; }

  /* 능력 카테고리 탭 */
  .ab-tabs { display: flex; gap: 4px; }
  .ab-tab {
    flex: 1; padding: 8px 6px;
    background: #1a1f2b; color: #9aa3b3;
    border: 1px solid #2a2f3a;
    font-family: inherit; font-size: 11px;
    cursor: pointer; touch-action: manipulation;
  }
  .ab-tab.active { background: #3d5380; color: #fff; border-color: #5870a0; }
  .ab-tab span { color: #ffd479; font-weight: bold; margin-left: 4px; }
  #wrap.portrait .ab-tab { font-size: 13px; padding: 12px 8px; min-height: 44px; }

  /* === 능력 목록 접기/펴기 === */
  /* 세로 모드: 능력창은 절대 위치 오버레이 — 아래에서 슬라이드 업, 게임 화면 위로 덮음.
     게임 크기는 변하지 않음. 가로 모드는 기존대로 인라인 표시. */
  .ability-toggle {
    display: none;
    width: 100%;
    padding: 12px;
    background: #1f2735;
    color: #e8eaf0;
    border: 1px solid #3a4256;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .ability-toggle:hover { background: #2a3550; }
  #wrap.portrait .ability-toggle { display: block; padding: 14px; font-size: 14px; min-height: 48px; }
  #wrap.portrait #panel { position: relative; }
  #wrap.portrait #abilities {
    position: absolute;
    left: 12px; right: 12px;
    bottom: var(--abilities-anchor, 220px);
    max-height: 60vh;
    overflow-y: auto;
    background: rgba(20, 24, 34, 0.96);
    border: 1px solid #2a2f3a;
    border-radius: 6px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    box-sizing: border-box;
    /* 자기 키(100%) + anchor 거리 + 여유 — 토글/배속 영역 아래로 완전히 숨김 */
    transform: translateY(calc(100% + var(--abilities-anchor, 220px) + 20px));
    transition: transform 0.35s cubic-bezier(0.2, 0.7, 0.2, 1);
    z-index: 5;
    box-shadow: 0 -8px 20px rgba(0, 0, 0, 0.5);
    pointer-events: none;
  }
  #wrap.portrait #abilities.expanded {
    transform: translateY(0);
    pointer-events: auto;
  }
  #wrap.portrait #randomBtn { padding: 16px; font-size: 15px; min-height: 52px; }
  #wrap.portrait .speed-btn { padding: 14px 0; font-size: 14px; min-height: 48px; }
  #wrap.portrait #stats { font-size: 14px; }
  button { touch-action: manipulation; }
  canvas {
    background: #11141c;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 2px solid #2a2f3a;
    box-shadow: 0 0 40px rgba(120, 180, 255, 0.08);
  }
  #panel {
    width: 260px; height: 640px;
    background: #141822; border: 2px solid #2a2f3a;
    padding: 12px; box-sizing: border-box;
    display: flex; flex-direction: column; gap: 10px;
    font-size: 12px;
  }
  #stats { line-height: 1.6; }
  #stats .row { display: flex; justify-content: space-between; }
  #stats .label { color: #6b7283; }
  .bar { background: #1a1f2b; height: 8px; border: 1px solid #2a2f3a; position: relative; overflow: hidden; }
  .bar > i { display:block; height:100%; background:#52e07a; transition: width .15s; }
  .bar.danger > i { background: #ff5b6e; }
  .bar.warn   > i { background: #ffd479; }
  hr { border: 0; border-top: 1px solid #2a2f3a; margin: 4px 0; }
  button {
    font-family: inherit; font-size: 12px;
    background: #1f2735; color: #e8eaf0;
    border: 1px solid #3a4256; padding: 6px 8px; cursor: pointer;
    transition: background .1s;
  }
  button:hover:not(:disabled) { background: #2a3550; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #randomBtn { width: 100%; padding: 10px; font-weight: bold; }
  .ability-row {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 4px; align-items: center;
    padding: 6px; background: #1a1f2b; border: 1px solid #242a38;
  }
  .ability-row.empty { color: #4a5163; text-align:center; padding: 8px; }
  .ability-name { display: flex; flex-direction: column; }
  .ability-name b { color: #e8eaf0; }
  .ability-name small { color: #6b7283; }
  .toast {
    position:absolute; left:50%; top:20px; transform:translateX(-50%);
    background: rgba(20,24,34,0.95); color:#fff; padding:8px 14px;
    border:1px solid #3a4256; font-size:12px; pointer-events:none;
    opacity:0; transition: opacity .2s;
  }
  .toast.show { opacity: 1; }
  #abilities { display:flex; flex-direction:column; gap:4px; }
  .footer { margin-top:auto; color:#4a5163; font-size:11px; text-align:center; }
  .speed-row { display:flex; gap:4px; margin-top:6px; }
  .speed-btn { flex:1; padding:6px 0; font-size:11px; }
  .speed-btn.active { background:#3d5380; color:#fff; border-color:#5870a0; }

  /* ===== 메뉴 / 도감 화면 ===== */
  .screen {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: safe center;
    background: #0b0d12;
    z-index: 10;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
    overflow-y: auto;
    overflow-x: hidden;
    touch-action: pan-y;
    -webkit-overflow-scrolling: touch;
  }
  .screen.show { display: flex; }

  /* === 작은 창 대응 — 메뉴 화면 자동 축소 === */
  @media (max-height: 720px) {
    #menu h1 { font-size: 42px; letter-spacing: 6px; margin-bottom: 6px; }
    #menu .subtitle { margin-bottom: 22px; font-size: 12px; }
    .menu-btn { padding: 12px; font-size: 15px; margin: 4px; width: 240px; }
  }
  @media (max-height: 540px) {
    #menu h1 { font-size: 30px; letter-spacing: 4px; }
    #menu .subtitle { margin-bottom: 12px; }
    .menu-btn { padding: 8px 10px; font-size: 13px; margin: 3px; width: 220px; }
  }
  @media (max-width: 360px) {
    #menu h1 { font-size: 36px; letter-spacing: 4px; }
    .menu-btn { width: calc(100vw - 40px); max-width: 280px; }
    .codex-header h2, #shop-list, #character-list { font-size: 14px; }
  }
  #menu h1 {
    font-size: 56px;
    letter-spacing: 10px;
    color: #7ad7ff;
    text-shadow: 0 0 30px rgba(122, 215, 255, 0.45);
    margin: 0 0 12px;
  }
  /* 개발용: 데이터 초기화 버튼 (메뉴 우측 상단) */
  .reset-data-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    padding: 8px 12px;
    background: #2a1018;
    color: #c08090;
    border: 1px solid #5a3038;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .reset-data-btn:hover { background: #3a1820; color: #ffaabb; }
  #menu .subtitle {
    color: #6b7283;
    margin-bottom: 50px;
    letter-spacing: 4px;
    font-size: 13px;
  }
  .menu-btn {
    width: 260px;
    padding: 18px;
    margin: 6px;
    font-size: 18px;
    font-family: inherit;
    background: #1f2735;
    color: #e8eaf0;
    border: 2px solid #3a4256;
    cursor: pointer;
    transition: background .12s, border-color .12s, transform .08s;
    touch-action: manipulation;
  }
  .menu-btn:hover { background: #2a3550; border-color: #5870a0; }
  .menu-btn:active { transform: scale(0.97); }

  #codex {
    padding: 24px;
    align-items: stretch;
    box-sizing: border-box;
  }
  .codex-header {
    display: flex; justify-content: space-between; align-items: center;
    max-width: 900px; width: 100%;
    margin: 0 auto 14px;
  }
  .codex-header h2 { margin: 0; font-size: 22px; letter-spacing: 6px; color: #7ad7ff; }
  .codex-back {
    padding: 10px 18px;
    background: #1f2735; color: #e8eaf0;
    border: 1px solid #3a4256;
    cursor: pointer; font-family: inherit; font-size: 13px;
    touch-action: manipulation;
  }
  .codex-back:hover { background: #2a3550; }
  .codex-tabs {
    display: flex; gap: 8px;
    max-width: 900px; width: 100%;
    margin: 0 auto 12px;
  }
  .codex-tab {
    padding: 10px 18px;
    background: #1f2735; color: #9aa3b3;
    border: 1px solid #3a4256;
    cursor: pointer; font-family: inherit; font-size: 13px;
    touch-action: manipulation;
  }
  .codex-tab.active { background: #3d5380; color: #fff; border-color: #5870a0; }
  #codex-list {
    max-width: 900px; width: 100%;
    margin: 0 auto;
    overflow-y: auto;
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
    padding: 4px 4px 24px;
  }
  .codex-card {
    background: #141822;
    border: 1px solid #2a2f3a;
    border-left: 4px solid #7ad7ff;
    padding: 12px;
    font-size: 12px;
    line-height: 1.5;
  }
  .codex-card .name {
    font-weight: bold;
    font-size: 15px;
    margin-bottom: 4px;
  }
  .codex-card .desc {
    color: #c8cdd8;
    font-size: 12px;
  }
  .codex-card .recipe {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #2a2f3a;
    color: #9aa3b3;
    font-size: 11px;
  }
  .codex-card.locked {
    background: #0f1219;
    border-color: #232732;
    border-left-color: #2a2f3a !important;
  }
  .codex-card.locked .name { color: #4a5163; }
  .codex-card.locked .desc { color: #3a4153; font-style: italic; }

  /* ===== 기록 화면 ===== */
  #records, #recordDetail { padding: 24px; align-items: stretch; }
  #records-list, #record-detail-content {
    max-width: 720px; width: 100%; margin: 0 auto;
    overflow-y: auto; flex: 1; padding-bottom: 24px;
  }
  .record-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #141822;
    border: 1px solid #2a2f3a;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .record-card:hover { background: #1a1f2b; border-color: #3a4256; }
  .record-card.win { border-left: 4px solid #ffe070; }
  .record-card .rank {
    font-size: 26px; font-weight: bold; color: #7ad7ff;
    width: 44px; text-align: center;
  }
  .record-card.win .rank { color: #ffe070; }
  .record-card .info { flex: 1; }
  .record-card .score { font-size: 18px; font-weight: bold; color: #e8eaf0; }
  .record-card .meta { color: #9aa3b3; font-size: 12px; margin-top: 4px; }
  .record-card .arrow { color: #6b7283; font-size: 18px; }
  .record-empty { color: #6b7283; text-align: center; padding: 40px; }
  #record-detail-header {
    text-align: center; margin-bottom: 22px;
  }
  #record-detail-header .big-score { font-size: 32px; color: #7ad7ff; margin-bottom: 6px; }
  #record-detail-header.win .big-score { color: #ffe070; }
  #record-detail-header .sub { color: #9aa3b3; font-size: 13px; }
  #record-detail-header .when { color: #6b7283; font-size: 11px; margin-top: 4px; }
  #record-detail-abilities {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }

  /* ===== 강화소 ===== */
  #shop { padding: 24px; align-items: stretch; }
  #shop-list {
    max-width: 720px; width: 100%; margin: 0 auto;
    overflow-y: auto; flex: 1;
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    padding-bottom: 24px;
  }
  .shop-card {
    background: #141822;
    border: 1px solid #2a2f3a;
    border-left: 4px solid #7ad7ff;
    padding: 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
  }
  .shop-card.maxed { border-left-color: #52e07a; opacity: 0.7; }
  .shop-card .name { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
  .shop-card .desc { font-size: 12px; color: #c8cdd8; }
  .shop-card .lv {
    color: #9bb3ff; font-size: 11px; margin-top: 4px;
  }
  .shop-buy {
    background: #1f2735; color: #ffd479;
    border: 1px solid #ffd479; padding: 10px 16px;
    font-family: inherit; font-size: 13px; cursor: pointer;
    touch-action: manipulation; min-width: 90px;
  }
  .shop-buy:hover:not(:disabled) { background: #2a3550; }
  .shop-buy:disabled { opacity: 0.4; cursor: not-allowed; border-color: #3a4256; color: #6b7283; }
  .shop-buy.maxed { color: #52e07a; border-color: #52e07a; }
  .stardust-bar {
    text-align: center;
    margin: 0 auto 16px;
    max-width: 720px; width: 100%;
    padding: 10px;
    background: #141822;
    border: 1px solid #2a2f3a;
    color: #ffd479;
    font-size: 16px;
  }

  /* ===== 캐릭터 선택 화면 ===== */
  #characterScreen { padding: 24px; align-items: stretch; }
  #character-list {
    max-width: 720px; width: 100%; margin: 0 auto;
    overflow-y: auto; flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
    padding-bottom: 24px;
  }
  .char-card {
    background: #141822;
    border: 2px solid #2a2f3a;
    border-left: 4px solid #7ad7ff;
    padding: 14px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .char-card:hover:not(.locked) { background: #1a1f2b; }
  .char-card.selected { border-color: #ffd479; background: #1a2030; }
  .char-card.locked { opacity: 0.5; cursor: not-allowed; }
  .char-card .char-name { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
  .char-card .char-desc { font-size: 12px; color: #c8cdd8; line-height: 1.5; }
  .char-card .char-lock { font-size: 11px; color: #ff8a98; margin-top: 6px; }
  .char-card .char-selected-tag { font-size: 11px; color: #ffd479; margin-top: 6px; font-weight: bold; }
  .char-card .char-start { font-size: 11px; color: #9aa3b3; margin-top: 6px; }

  /* ===== 업적 화면 ===== */
  #achievementsScreen { padding: 24px; align-items: stretch; }
  #achievements-list {
    max-width: 720px; width: 100%; margin: 0 auto;
    overflow-y: auto; flex: 1;
    padding-bottom: 24px;
  }
  .achievement-summary {
    text-align: center;
    margin: 0 auto 14px;
    max-width: 720px; width: 100%;
    padding: 10px;
    background: #141822;
    border: 1px solid #2a2f3a;
    color: #c8cdd8;
    font-size: 14px;
  }
  .achievement-summary b { color: #ffd479; }
  .achievement-card {
    display: flex; gap: 14px;
    align-items: center;
    background: #141822;
    border: 1px solid #2a2f3a;
    border-left: 4px solid #4a5163;
    padding: 14px;
    margin-bottom: 6px;
  }
  .achievement-card.unlocked {
    border-left-color: #ffd479;
    background: #1a2030;
  }
  .achievement-card .ach-icon {
    font-size: 22px;
    width: 36px;
    text-align: center;
    color: #4a5163;
  }
  .achievement-card.unlocked .ach-icon { color: #ffd479; }
  .achievement-card .ach-info { flex: 1; min-width: 0; }
  .achievement-card .ach-name {
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 4px;
    color: #9aa3b3;
  }
  .achievement-card.unlocked .ach-name { color: #ffd479; }
  .achievement-card .ach-desc {
    color: #c8cdd8;
    font-size: 12px;
    margin-bottom: 6px;
  }
  .achievement-card .ach-rewards {
    display: flex; gap: 6px;
    flex-wrap: wrap;
  }
  .achievement-card .ach-reward {
    padding: 3px 8px;
    font-size: 11px;
    border-radius: 2px;
  }
  .achievement-card .ach-reward.stardust {
    background: #2a2410; color: #ffd479;
    border: 1px solid #5a4a18;
  }
  .achievement-card .ach-reward.character {
    background: #122030; color: #88c8ff;
    border: 1px solid #2a4878;
  }
  .achievement-card .ach-reward.ability {
    background: #102818; color: #88dda8;
    border: 1px solid #2a5a3a;
  }
  .achievement-card .ach-reward.count {
    background: #182030; color: #9bb3ff;
    border: 1px solid #2a4878;
  }
  .achievement-card.repeat {
    border-left-color: #88c8ff;
  }
  .achievement-card.repeat.unlocked {
    background: #102030;
    border-left-color: #88c8ff;
  }
  .achievement-card.repeat .ach-icon { color: #88c8ff; }
  .achievement-card.repeat .ach-name { color: #88c8ff; }
  .ach-section-header {
    color: #9aa3b3;
    font-size: 12px;
    letter-spacing: 3px;
    padding: 14px 4px 6px;
    margin-top: 8px;
    border-bottom: 1px solid #2a2f3a;
  }
  .ach-section-header:first-child { margin-top: 0; }
</style>
</head>
<body>
<!-- ===== 메뉴 화면 ===== -->
<div id="menu" class="screen show">
  <button id="resetDataBtn" class="reset-data-btn" title="개발용: 모든 저장 데이터 초기화">🗑 데이터 초기화</button>
  <h1>DOT DEFENSE</h1>
  <div class="subtitle">픽셀 디펜스 · 능력 조합 빌더</div>
  <button id="startBtn" class="menu-btn">▶ 스타트</button>
  <button id="characterBtn" class="menu-btn">👤 캐릭터 선택</button>
  <button id="shopBtn" class="menu-btn">⭐ 강화소</button>
  <button id="codexBtn" class="menu-btn">📖 도감</button>
  <button id="achievementsBtn" class="menu-btn">🏅 업적</button>
  <button id="recordsBtn" class="menu-btn">🏆 기록</button>
</div>

<!-- ===== 업적 화면 ===== -->
<div id="achievementsScreen" class="screen">
  <div class="codex-header">
    <h2>업적</h2>
    <button id="achievementsBack" class="codex-back">← 메뉴로</button>
  </div>
  <div class="achievement-summary" id="achievement-summary">달성 0/0</div>
  <div id="achievements-list"></div>
</div>

<!-- ===== 캐릭터 선택 화면 ===== -->
<div id="characterScreen" class="screen">
  <div class="codex-header">
    <h2>캐릭터 선택</h2>
    <button id="characterBack" class="codex-back">← 메뉴로</button>
  </div>

<script>
(() => {
  // ===== 상수 =====
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = canvas.width, H = canvas.height;
  const CX = W/2, CY = H/2;

  const ARENA_R = 290;
  const CORE_R  = 22;
  const MAX_ALIVE = 80;         // 이 수치 넘으면 게임오버
  const MAX_SLOTS = 6;          // 액티브/패시브 각각 6칸씩
  function maxActiveSlots() {
    const metaBonus = (META.upgrades && META.upgrades.extraSlot) || 0;
    const charMod = (typeof state !== 'undefined' && state && state.metaMods) ? (state.metaMods.slotMod || 0) : 0;
    return MAX_SLOTS + metaBonus + charMod;
  }
  function maxPassiveSlots() { return MAX_SLOTS; }
  function activeCount() { return state.tower.abilities.filter(a => !ABILITY_DEFS[a.id].isPassive).length; }
  function passiveCount() { return state.tower.abilities.filter(a => ABILITY_DEFS[a.id].isPassive).length; }
  // 역호환
  function activeMaxSlots() { return maxActiveSlots(); }
  const FPS = 60;

  // ===== 능력 정의 (각 능력은 독립적인 공격) =====
  // 각 ability instance: { id, level, cooldown, ...각 ability별 상태 }
  // def에는 init(ab), tick(ab), draw?(ab) 메서드가 있음
  const ABILITY_DEFS = {
    shot: {
      name: '샷', baseCost: 30, color: '#ffe28a',
      desc: lv => `단발 유도 · DMG ${1+lv}`,
      init(ab) { ab.cooldown = 0; },
      tick(ab) {
        if (--ab.cooldown > 0) return;
        const target = findNearestEnemy(ARENA_R + 50);
        if (!target) return;
        const [tx, ty] = enemyXY(target);
        const ang = Math.atan2(ty - CY, tx - CX);
        fireBullet(ang, 1 + ab.level, '#ffe28a', target);
        ab.cooldown = 22;
      },
    },
    multi: {
      name: '멀티샷', baseCost: 45, color: '#7ad7ff',
      desc: lv => `${2+lv}발 V편대 · 가운데 유도 · DMG 1`,
      // 가운데 탄환만 적을 유도. 사이드 탄환은 가운데 탄환의 진행 방향을
      // 추종하여 함께 휜다 (편대 비행처럼).
      init(ab) { ab.cooldown = 20; },
      tick(ab) {
        if (--ab.cooldown > 0) return;
        const target = findNearestEnemy(ARENA_R + 50);
        if (!target) return;
        const [tx, ty] = enemyXY(target);
        const base = Math.atan2(ty - CY, tx - CX);
        const n = 2 + ab.level;
        const spread = Math.min(Math.PI * 0.5, (n - 1) * 0.22);
        const leaderIdx = Math.floor((n - 1) / 2);
        const leaderOff = n === 1 ? 0 : (-spread/2 + spread * (leaderIdx/(n-1)));

        // 가운데 (리더 — 유도)
        const leader = fireBullet(base + leaderOff, 1, '#7ad7ff', target);

        // 사이드 (리더 방향 따라감)
        for (let i = 0; i < n; i++) {
          if (i === leaderIdx) continue;
          const off = n === 1 ? 0 : (-spread/2 + spread * (i/(n-1)));
          fireBullet(base + off, 1, '#7ad7ff', null, leader, off - leaderOff);
        }
        ab.cooldown = 55;
      },
    },
    nova: {
      name: '노바', baseCost: 55, color: '#b890ff',
      desc: lv => `확장 충격파 · DMG ${1+lv}`,
      // 충격파가 중심에서 외곽까지 퍼지며, 지나가는 모든 적에 1회 데미지
      init(ab) { ab.cooldown = 60; ab.waves = []; },
      tick(ab) {
        const dmg = 1 + ab.level;
        for (const w of ab.waves) {
          w.prevR = w.r;
          w.r += 5;
          for (const e of state.enemies) {
            if (w.hit.has(e) || e.hp <= 0) continue;
            const [ex, ey] = enemyXY(e);
            const d = Math.hypot(ex - CX, ey - CY);
            if (d >= w.prevR - 10 && d <= w.r + 10) {
              damageEnemy(e, dmg);
              spawnParticles(ex, ey, '#b890ff', 3);
              w.hit.add(e);
            }
          }
        }
        ab.waves = ab.waves.filter(w => w.r < ARENA_R + 30);
        if (--ab.cooldown > 0) return;
        ab.waves.push({ r: CORE_R, prevR: CORE_R, hit: new Set() });
        ab.cooldown = Math.max(70, 150 - ab.level * 8);
      },
      draw(ab) {
        for (const w of ab.waves) {
          const a = Math.max(0, 1 - w.r / (ARENA_R + 30));
          ctx.globalAlpha = a;
          ctx.strokeStyle = '#b890ff'; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.arc(CX, CY, w.r, 0, Math.PI*2); ctx.stroke();
        }
        ctx.globalAlpha = 1;
      },
    },
    laser: {
      name: '레이저', baseCost: 50, color: '#ff5b6e',
      desc: lv => `관통 빔 · DMG ${2+lv}`,
      // 가장 가까운 적 방향으로 아레나 끝까지 관통 빔
      init(ab) { ab.cooldown = 30; ab.fx = 0; ab.fxAng = 0; },
      tick(ab) {
        if (ab.fx > 0) ab.fx--;
        if (--ab.cooldown > 0) return;
        const target = findNearestEnemy(ARENA_R + 50);
        if (!target) return;
        const [tx, ty] = enemyXY(target);
        const ang = Math.atan2(ty - CY, tx - CX);
        const len = ARENA_R + 20;
        const ex = CX + Math.cos(ang) * len;
        const ey = CY + Math.sin(ang) * len;
        const dmg = 2 + ab.level;
        for (const e of state.enemies) {
          const [px, py] = enemyXY(e);
          if (distPointSegmentSq(px, py, CX, CY, ex, ey) < 144) {
            damageEnemy(e, dmg);
            spawnParticles(px, py, '#ff5b6e', 3);
          }
        }
        ab.fxAng = ang;
        ab.fx = 8;
        ab.cooldown = 75;
      },
      draw(ab) {
        if (ab.fx <= 0) return;
        const len = ARENA_R + 20;
        const ex = CX + Math.cos(ab.fxAng) * len;
        const ey = CY + Math.sin(ab.fxAng) * len;
        ctx.globalAlpha = ab.fx / 8;
        ctx.strokeStyle = '#ff5b6e'; ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(CX, CY); ctx.lineTo(ex, ey); ctx.stroke();
        ctx.strokeStyle = '#ffd0d6'; ctx.lineWidth = 2;
        ctx.stroke();
        ctx.globalAlpha = 1;
      },
    },
    chain: {
      name: '체인', baseCost: 50, color: '#88e0ff',
      desc: lv => `${1+lv}회 연쇄 · DMG ${1+lv}`,
      // 첫 타깃은 아레나 전역에서, 연쇄는 인근 적으로
      init(ab) { ab.cooldown = 40; ab.fx = 0; ab.fxPoints = []; },
      tick(ab) {
        if (ab.fx > 0) ab.fx--;
        if (--ab.cooldown > 0) return;
        const first = findNearestEnemy(ARENA_R + 50);
        if (!first) return;
        const dmg = 1 + ab.level;
        const chains = 1 + ab.level;
        const hit = new Set();
        let current = first;
        const points = [[CX, CY]];
        for (let i = 0; i < chains; i++) {
          if (!current) break;
          const [cx, cy] = enemyXY(current);
          points.push([cx, cy]);
          damageEnemy(current, dmg);
          spawnParticles(cx, cy, '#88e0ff', 3);
          hit.add(current);
          let next = null, best = 140*140;
          for (const e of state.enemies) {
            if (hit.has(e) || e.hp <= 0) continue;
            const [ex2, ey2] = enemyXY(e);
            const d2 = (ex2-cx)*(ex2-cx) + (ey2-cy)*(ey2-cy);
            if (d2 < best) { best = d2; next = e; }
          }
          current = next;
        }
        ab.fxPoints = points;
        ab.fx = 10;
        ab.cooldown = 90;
      },
      draw(ab) {
        if (ab.fx <= 0 || ab.fxPoints.length < 2) return;
        ctx.globalAlpha = ab.fx / 10;
        ctx.strokeStyle = '#88e0ff'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ab.fxPoints[0][0], ab.fxPoints[0][1]);
        for (let i = 1; i < ab.fxPoints.length; i++) {
          const [x1, y1] = ab.fxPoints[i-1];
          const [x2, y2] = ab.fxPoints[i];
          const mx = (x1+x2)/2 + (Math.random()-0.5)*10;
          const my = (y1+y2)/2 + (Math.random()-0.5)*10;
          ctx.lineTo(mx, my);
          ctx.lineTo(x2, y2);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;
      },
    },
    orbital: {
      name: '오비탈', baseCost: 60, color: '#52e07a',
      desc: lv => `${1+lv}개 위성 · 적 거리 추적 궤도 · DMG ${1+lv}`,
      // 모든 위성이 같은 반경에서 회전. 그 반경이 "가장 가까운 적까지의 거리"를
      // 부드럽게 추종 → 궤도가 숨쉬듯 늘었다 줄었다 함.
      // 레벨업: +1 위성, +회전속도
      init(ab) {
        ab.angle = 0;
        ab.radius = 150;
        ab.targetRadius = 150;
        ab.hits = new Map();
      },
      tick(ab) {
        // 회전 속도: 레벨업 시 가속
        const rotSpeed = 0.030 + ab.level * 0.008;
        ab.angle += rotSpeed;

        // 가장 가까운 적까지의 거리로 궤도 반경 목표값 갱신
        const target = findNearestEnemy(ARENA_R + 100);
        if (target) {
          const [tx, ty] = enemyXY(target);
          ab.targetRadius = Math.hypot(tx - CX, ty - CY);
        }
        // 부드러운 추종 (프레임당 5% 접근)
        ab.radius += (ab.targetRadius - ab.radius) * 0.05;
        ab.radius = Math.max(50, Math.min(ARENA_R - 10, ab.radius));

        // 히트 쿨다운 정리
        for (const [e, cd] of ab.hits) {
          if (cd <= 1 || e.hp <= 0) ab.hits.delete(e);
          else ab.hits.set(e, cd - 1);
        }

        const count = 1 + ab.level;
        const dmg = 1 + ab.level;
        for (let i = 0; i < count; i++) {
          const a = ab.angle + (Math.PI * 2 / count) * i;
          const ox = CX + Math.cos(a) * ab.radius;
          const oy = CY + Math.sin(a) * ab.radius;
          for (const e of state.enemies) {
            if (ab.hits.has(e) || e.hp <= 0) continue;
            const [ex, ey] = enemyXY(e);
            const rr = e.size + 6;
            if ((ox-ex)*(ox-ex) + (oy-ey)*(oy-ey) < rr*rr) {
              damageEnemy(e, dmg);
              ab.hits.set(e, 30);
              spawnParticles(ex, ey, '#52e07a', 3);
            }
          }
        }
      },
      draw(ab) {
        const count = 1 + ab.level;
        // 궤도 path (옅게)
        ctx.strokeStyle = 'rgba(82, 224, 122, 0.12)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(CX, CY, ab.radius, 0, Math.PI*2); ctx.stroke();
        // 위성
        for (let i = 0; i < count; i++) {
          const a = ab.angle + (Math.PI * 2 / count) * i;
          const ox = CX + Math.cos(a) * ab.radius;
          const oy = CY + Math.sin(a) * ab.radius;
          ctx.fillStyle = '#1d2230'; ctx.fillRect(ox - 4, oy - 4, 8, 8);
          ctx.fillStyle = '#52e07a'; ctx.fillRect(ox - 3, oy - 3, 6, 6);
          ctx.fillStyle = '#aaffbb'; ctx.fillRect(ox - 1, oy - 1, 2, 2);
        }
      },
    },

    // ===== 추가 확장 능력 =====
    scatter: {
      name: '산탄', baseCost: 40, color: '#ffb070',
      desc: lv => `${6+lv*2}방향 산탄 · DMG ${1+Math.floor(lv/2)}`,
      // 매 발사마다 360도로 균등 분산. 타겟 없이 사방으로.
      init(ab) { ab.cooldown = 30; },
      tick(ab) {
        if (--ab.cooldown > 0) return;
        const n = 6 + ab.level * 2;
        const dmg = 1 + Math.floor(ab.level / 2);
        const off = Math.random() * (Math.PI * 2 / n);
        for (let i = 0; i < n; i++) {
          const ang = (Math.PI * 2 / n) * i + off;
          fireBullet(ang, dmg, '#ffb070', null);
        }
        ab.cooldown = Math.max(45, 90 - ab.level * 5);
      },
    },

    mortar: {
      name: '포격', baseCost: 70, color: '#ff7050',
      desc: lv => `광역 폭격 · DMG ${3+lv*2} · 반경 ${50+lv*8}`,
      // 최고 HP 적 위치에 폭격 → 그 주변 모든 적에 데미지.
      init(ab) { ab.cooldown = 90; ab.fx = []; },
      tick(ab) {
        for (const e of ab.fx) e.life--;
        ab.fx = ab.fx.filter(e => e.life > 0);
        if (--ab.cooldown > 0) return;
        let target = null, best = -1;
        for (const e of state.enemies) {
          if (e.hp > best) { best = e.hp; target = e; }
        }
        if (!target) return;
        const [tx, ty] = enemyXY(target);
        const radius = 50 + ab.level * 8;
        const dmg = 3 + ab.level * 2;
        for (const e of state.enemies) {
          if (e.hp <= 0) continue;
          const [ex, ey] = enemyXY(e);
          if ((ex-tx)*(ex-tx) + (ey-ty)*(ey-ty) < radius*radius) {
            damageEnemy(e, dmg);
            spawnParticles(ex, ey, '#ff7050', 4);
          }
        }
        ab.fx.push({ x: tx, y: ty, r: radius, life: 20 });
        ab.cooldown = Math.max(50, 100 - ab.level * 6);
      },
      draw(ab) {
        for (const e of ab.fx) {
          const t = 1 - e.life / 20;
          ctx.globalAlpha = e.life / 20;
          ctx.strokeStyle = '#ff7050'; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.arc(e.x, e.y, e.r * t, 0, Math.PI*2); ctx.stroke();
        }
        ctx.globalAlpha = 1;
      },
    },

    thunder: {
      name: '벼락', baseCost: 60, color: '#ffe070',
      desc: lv => `${1+lv}마리 무작위 낙뢰 · DMG ${3+lv*2}`,
      // 매 발동마다 무작위 적 N마리에 하늘에서 낙뢰.
      init(ab) { ab.cooldown = 50; ab.bolts = []; },
      tick(ab) {
        for (const b of ab.bolts) b.life--;
        ab.bolts = ab.bolts.filter(b => b.life > 0);
        if (--ab.cooldown > 0) return;
        const count = 1 + ab.level;
        const dmg = 3 + ab.level * 2;
        const pool = state.enemies.filter(e => e.hp > 0);
        for (let i = 0; i < count && pool.length > 0; i++) {
          const idx = Math.floor(Math.random() * pool.length);
          const target = pool.splice(idx, 1)[0];
          const [tx, ty] = enemyXY(target);
          damageEnemy(target, dmg);
          spawnParticles(tx, ty, '#ffe070', 6);
          ab.bolts.push({ x: tx, y: ty, life: 10 });
        }
        ab.cooldown = Math.max(25, 60 - ab.level * 5);
      },
      draw(ab) {
        for (const b of ab.bolts) {
          ctx.globalAlpha = b.life / 10;
          ctx.fillStyle = '#ffe070'; ctx.fillRect(b.x - 2, 0, 4, b.y);
          ctx.fillStyle = '#fff8a0'; ctx.fillRect(b.x - 1, 0, 2, b.y);
        }
        ctx.globalAlpha = 1;
      },
    },

    turret: {
      name: '터렛', baseCost: 70, color: '#88aaff',
      desc: lv => `${2+lv}개 보조포 · DMG 1 · 빠른 연사`,
      // 타워 주변 N개의 미니 포탑이 각자 가장 가까운 적에게 연사.
      init(ab) { ab.angle = 0; ab.cooldowns = []; },
      tick(ab) {
        const count = 2 + ab.level;
        while (ab.cooldowns.length < count) ab.cooldowns.push(0);
        while (ab.cooldowns.length > count) ab.cooldowns.pop();
        ab.angle += 0.004;
        const radius = 50;
        for (let i = 0; i < count; i++) {
          if (--ab.cooldowns[i] > 0) continue;
          const a = ab.angle + (Math.PI * 2 / count) * i;
          const tx = CX + Math.cos(a) * radius;
          const ty = CY + Math.sin(a) * radius;
          let target = null, best = Infinity;
          for (const e of state.enemies) {
            if (e.hp <= 0) continue;
            const [ex, ey] = enemyXY(e);
            const d2 = (ex-tx)*(ex-tx) + (ey-ty)*(ey-ty);
            if (d2 < best) { best = d2; target = e; }
          }
          if (target) {
            const [tex, tey] = enemyXY(target);
            const ang = Math.atan2(tey - ty, tex - tx);
            state.bullets.push({
              x: tx, y: ty,
              vx: Math.cos(ang)*7, vy: Math.sin(ang)*7,
              dmg: 1, life: 80, color: '#88aaff',
              target: null, leader: null, offsetAngle: 0,
            });
            ab.cooldowns[i] = Math.max(12, 30 - ab.level * 2);
          }
        }
      },
      draw(ab) {
        const count = 2 + ab.level;
        const radius = 50;
        for (let i = 0; i < count; i++) {
          const a = ab.angle + (Math.PI * 2 / count) * i;
          const tx = CX + Math.cos(a) * radius;
          const ty = CY + Math.sin(a) * radius;
          ctx.fillStyle = '#1d2230'; ctx.fillRect(tx - 5, ty - 5, 10, 10);
          ctx.fillStyle = '#88aaff'; ctx.fillRect(tx - 4, ty - 4, 8, 8);

    tornado: {

      desc: lv => `${1+lv}개 떠도는 회오리 · DMG ${1+lv}`,
      // 아레나를 무작위로 떠도는 N개의 AOE. 부딪힌 적에게 데미지.
      init(ab) { ab.tornadoes = []; ab.hits = new Map(); },
      tick(ab) {
        const want = 1 + ab.level;
        while (ab.tornadoes.length < want) {
          const a = Math.random() * Math.PI * 2;
          const r = Math.random() * (ARENA_R - 60);
          ab.tornadoes.push({
            x: CX + Math.cos(a) * r,
            y: CY + Math.sin(a) * r,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4,
            rot: 0,
          });
        }
        while (ab.tornadoes.length > want) ab.tornadoes.pop();
        for (const [e, cd] of ab.hits) {
          if (cd <= 1 || e.hp <= 0) ab.hits.delete(e);
          else ab.hits.set(e, cd - 1);
        }
        const dmg = 1 + ab.level;
        const tR = 38;
        for (const t of ab.tornadoes) {
          t.x += t.vx; t.y += t.vy;
          t.rot += 0.22;
          const dx = t.x - CX, dy = t.y - CY;
          const d = Math.hypot(dx, dy);
          if (d > ARENA_R - tR) {
            const nx = dx/d, ny = dy/d;
            const dot = t.vx*nx + t.vy*ny;
            t.vx -= 2*dot*nx; t.vy -= 2*dot*ny;
            t.x = CX + nx*(ARENA_R - tR);
            t.y = CY + ny*(ARENA_R - tR);
          }
          if (Math.random() < 0.02) {
            t.vx += (Math.random() - 0.5) * 0.5;
            t.vy += (Math.random() - 0.5) * 0.5;
          }
          const sp = Math.hypot(t.vx, t.vy);
          if (sp > 4) { t.vx = t.vx/sp*4; t.vy = t.vy/sp*4; }
          if (sp < 1.5) { t.vx = t.vx/sp*1.5; t.vy = t.vy/sp*1.5; }
          for (const e of state.enemies) {
            if (ab.hits.has(e) || e.hp <= 0) continue;
            const [ex, ey] = enemyXY(e);
            if ((ex-t.x)*(ex-t.x) + (ey-t.y)*(ey-t.y) < tR*tR) {
              damageEnemy(e, dmg);
              ab.hits.set(e, 25);
              spawnParticles(ex, ey, '#88ffcc', 2);
            }
          }
        }
      },
      draw(ab) {
        const tR = 38;
        for (const t of ab.tornadoes) {
          ctx.strokeStyle = 'rgba(136, 255, 204, 0.25)';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(t.x, t.y, tR, 0, Math.PI*2); ctx.stroke();
          for (let i = 0; i < 6; i++) {
            const a = t.rot + i * (Math.PI * 2 / 6);
            const r = 14 + Math.sin(t.rot * 0.5 + i) * 10;
            const px = t.x + Math.cos(a) * r;
            const py = t.y + Math.sin(a) * r;
            ctx.fillStyle = '#88ffcc';
            ctx.fillRect(px - 2, py - 2, 4, 4);
          }
          ctx.fillStyle = '#ddffee';
          ctx.fillRect(t.x - 2, t.y - 2, 4, 4);
        }
      },
    },

              if (e.hp <= 0) continue;
              const [ex, ey] = enemyXY(e);

            while (diff > Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            const turn = 0.15;
            const c = Math.max(-turn, Math.min(turn, diff));
            const a = curAng + c;
            m.vx = Math.cos(a) * 5; m.vy = Math.sin(a) * 5;

            const dist = Math.hypot(dx, dy);
            const ideal = 120;
            if (dist > ideal + 20)      { d.vx = (dx/dist) * speed;        d.vy = (dy/dist) * speed; }
            else if (dist < ideal - 20) { d.vx = -(dx/dist) * speed * 0.5; d.vy = -(dy/dist) * speed * 0.5; }
            else                        { d.vx *= 0.8; d.vy *= 0.8; }
            d.cooldown--;
            if (d.cooldown <= 0) {
              const ang = Math.atan2(dy, dx);
              state.bullets.push({
                x: d.x, y: d.y,
                vx: Math.cos(ang) * 7, vy: Math.sin(ang) * 7,
                dmg, life: 80, color: '#9b88ff',
                target: null, leader: null, offsetAngle: 0,
              });
              d.cooldown = Math.max(14, 28 - ab.level);
            }
          } else {
            const ang = Math.atan2(CY - d.y, CX - d.x) + Math.PI / 2;
            d.vx = Math.cos(ang) * speed * 0.5;
            d.vy = Math.sin(ang) * speed * 0.5;
          }
          d.x += d.vx; d.y += d.vy;
          const ddx = d.x - CX, ddy = d.y - CY;
          const dd = Math.hypot(ddx, ddy);
          if (dd > ARENA_R - 20) {
            d.x = CX + ddx/dd * (ARENA_R - 20);
            d.y = CY + ddy/dd * (ARENA_R - 20);
          }
        }
      },
      draw(ab) {
        for (const d of ab.drones) {
          ctx.fillStyle = '#1d2230'; ctx.fillRect(d.x - 6, d.y - 4, 12, 8);
          ctx.fillStyle = '#9b88ff'; ctx.fillRect(d.x - 5, d.y - 3, 10, 6);
          ctx.fillStyle = '#dccfff'; ctx.fillRect(d.x - 1, d.y - 1, 2, 2);
          // 날개
          ctx.fillStyle = '#9b88ff';
          ctx.fillRect(d.x - 7, d.y - 1, 2, 2);
          ctx.fillRect(d.x + 5, d.y - 1, 2, 2);
        }
      },
    },

            const pr = 60 * (1 - prog) + 30;

            ctx.fillRect(CX + Math.cos(pa) * pr - 1, CY + Math.sin(pa) * pr - 1, 3, 3);
          }
          // 차징 게이지 원
          ctx.strokeStyle = '#88eeff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(CX, CY, 28, -Math.PI/2, -Math.PI/2 + prog * Math.PI * 2);
          ctx.stroke();
        }
        // 발사 빔
        if (ab.fireFx > 0) {
          const a = ab.fireFx / ab.fireDuration;
          const len = ARENA_R + 20;
          const ex = CX + Math.cos(ab.fireAng) * len;
          const ey = CY + Math.sin(ab.fireAng) * len;
          ctx.globalAlpha = a * 0.3;
          ctx.strokeStyle = '#88eeff'; ctx.lineWidth = 28;
          ctx.beginPath(); ctx.moveTo(CX, CY); ctx.lineTo(ex, ey); ctx.stroke();
          ctx.globalAlpha = a * 0.9;
          ctx.lineWidth = 14;

          ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4;

          ctx.globalAlpha = 1;

    shotgunBurst: {

    chainStorm: {
      name: '연쇄낙뢰', isCombo: true, baseCost: 140, color: '#ffee88',
      desc: lv => `${2+lv}곳 낙뢰 + ${3+lv}회 연쇄 · DMG ${8+lv*4}`,
      // 동시에 여러 적에게 거대 낙뢰가 떨어지고, 각 낙뢰가 길게 연쇄.
      init(ab) { ab.cooldown = 55; ab.bolts = []; ab.chains = []; },
      tick(ab) {
        for (const b of ab.bolts) b.life--;
        ab.bolts = ab.bolts.filter(b => b.life > 0);
        for (const c of ab.chains) c.life--;
        ab.chains = ab.chains.filter(c => c.life > 0);
        if (--ab.cooldown > 0) return;
        const strikes = 2 + ab.level;
        const chainCount = 3 + ab.level;
        const dmg = 8 + ab.level * 4;
        const pool = state.enemies.filter(e => e.hp > 0);
        for (let i = 0; i < strikes && pool.length > 0; i++) {
          const idx = Math.floor(Math.random() * pool.length);
          const target = pool.splice(idx, 1)[0];
          const [tx, ty] = enemyXY(target);
          damageEnemy(target, dmg);
          spawnParticles(tx, ty, '#ffee88', 10);
          ab.bolts.push({ x: tx, y: ty, life: 14 });
          const hit = new Set([target]);
          let current = target;
          const points = [[tx, ty]];
          for (let j = 0; j < chainCount; j++) {
            let next = null, best = 200*200;  // 더 멀리 연쇄
            const [cx, cy] = enemyXY(current);
            for (const e of state.enemies) {
              if (hit.has(e) || e.hp <= 0) continue;
              const [ex, ey] = enemyXY(e);
              const d2 = (ex-cx)*(ex-cx) + (ey-cy)*(ey-cy);
              if (d2 < best) { best = d2; next = e; }
            }
            if (!next) break;
            const [nx, ny] = enemyXY(next);
            damageEnemy(next, dmg);
            hit.add(next); current = next;
            points.push([nx, ny]);
            spawnParticles(nx, ny, '#88e0ff', 5);
          }
          if (points.length > 1) ab.chains.push({ points, life: 14 });
        }
        ab.cooldown = Math.max(30, 60 - ab.level * 4);
      },
      draw(ab) {
        for (const b of ab.bolts) {
          ctx.globalAlpha = b.life / 14;
          // 두꺼운 낙뢰 (외곽 + 코어)
          ctx.fillStyle = '#ffee88'; ctx.fillRect(b.x - 4, 0, 8, b.y);
          ctx.fillStyle = '#fff8a0'; ctx.fillRect(b.x - 2, 0, 4, b.y);
          ctx.fillStyle = '#ffffff'; ctx.fillRect(b.x - 1, 0, 2, b.y);
        }
        for (const c of ab.chains) {
          ctx.globalAlpha = c.life / 14;
          // 두꺼운 연쇄 라인 (외곽 + 코어)
          ctx.strokeStyle = '#88e0ff'; ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(c.points[0][0], c.points[0][1]);
          for (let i = 1; i < c.points.length; i++) ctx.lineTo(c.points[i][0], c.points[i][1]);
          ctx.stroke();
          ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5;
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      },
    },

    frostNova: {
      name: '빙결파동', isCombo: true, baseCost: 130, color: '#aaccff',
      desc: lv => `절대빙결 충격파 · DMG ${5+lv*3} · ${((200+lv*40)/60).toFixed(1)}s 슬로우`,
      // 빠른 쿨다운으로 강력한 빙결 파동을 연달아 발사. 데미지 + 매우 긴 슬로우.

          for (const e of state.enemies) {
            if (w.hit.has(e) || e.hp <= 0) continue;
            const [ex, ey] = enemyXY(e);
            const d = Math.hypot(ex - CX, ey - CY);
            if (d >= w.prevR - 12 && d <= w.r + 12) {

        for (const w of ab.waves) {
          const a = Math.max(0, 1 - w.r / (ARENA_R + 30));

          ctx.globalAlpha = a;
          ctx.strokeStyle = '#aaccff'; ctx.lineWidth = 6;
          ctx.beginPath(); ctx.arc(CX, CY, w.r, 0, Math.PI*2); ctx.stroke();
          // 내부 빛
          ctx.globalAlpha = a * 0.6;
          ctx.strokeStyle = '#e0eeff'; ctx.lineWidth = 2;
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      },
    },

      desc: lv => `초중장갑 ${1+lv}개 · DMG ${25+lv*15}`,
      // 거대한 회전 도끼. 가는 길/돌아오는 길 모두 적을 관통하며 막대한 데미지.
      init(ab) { ab.cooldown = 60; ab.boomerangs = []; },
      tick(ab) {
        const dmg = 25 + ab.level * 15;
        for (const b of ab.boomerangs) {
          b.life--; b.rotation += 0.5;
          if (b.phase === 'out') {
            b.t++;
            if (b.t >= b.outDuration) { b.phase = 'in'; b.hit = new Set(); }
          } else {
            const dx = CX - b.x, dy = CY - b.y;
            const d = Math.hypot(dx, dy);
            if (d < 20) { b.life = 0; continue; }
            b.vx = (dx/d) * 6; b.vy = (dy/d) * 6;
          }
          b.x += b.vx; b.y += b.vy;
          for (const e of state.enemies) {
            if (b.hit.has(e) || e.hp <= 0) continue;
            const [ex, ey] = enemyXY(e);
            const r = e.size + 18;  // 큰 충돌 반경
            if ((b.x-ex)*(b.x-ex) + (b.y-ey)*(b.y-ey) < r*r) {
              damageEnemy(e, dmg);
              b.hit.add(e);
              spawnParticles(ex, ey, '#ddcc88', 8);
            }
          }
        }
        ab.boomerangs = ab.boomerangs.filter(b => b.life > 0);
        if (--ab.cooldown > 0) return;
        const count = 1 + ab.level;
        // 최강 적 추적
        let target = null, best = -1;
        for (const e of state.enemies) {
          if (e.hp > best) { best = e.hp; target = e; }
        }
        if (!target) return;
        const [tx, ty] = enemyXY(target);
        for (let i = 0; i < count; i++) {
          const ang = Math.atan2(ty - CY, tx - CX) + (i - (count-1)/2) * 0.35;
          ab.boomerangs.push({
            x: CX, y: CY,
            vx: Math.cos(ang) * 6, vy: Math.sin(ang) * 6,
            t: 0, outDuration: 45, phase: 'out',
            rotation: 0, life: 220, hit: new Set(),
          });
        }
        ab.cooldown = Math.max(50, 90 - ab.level * 4);
      },
      draw(ab) {
        for (const b of ab.boomerangs) {
          ctx.save();
          ctx.translate(b.x, b.y); ctx.rotate(b.rotation);
          // 모션 블러 (옅은 외곽)
          ctx.globalAlpha = 0.4;
          ctx.fillStyle = '#ddcc88';
          ctx.fillRect(-16, -4, 32, 8); ctx.fillRect(-4, -16, 8, 32);
          ctx.globalAlpha = 1;
          // 외곽 (어둡)
          ctx.fillStyle = '#665533';
          ctx.fillRect(-13, -5, 26, 10); ctx.fillRect(-5, -13, 10, 26);
          // 본체
          ctx.fillStyle = '#ddcc88';
          ctx.fillRect(-11, -3, 22, 6); ctx.fillRect(-3, -11, 6, 22);
          // 하이라이트
          ctx.fillStyle = '#fff0aa';
          ctx.fillRect(-3, -3, 6, 6);
          ctx.restore();
        }
      },
    },

    missileTurret: {
      name: '미사일터렛', isCombo: true, baseCost: 160, color: '#aacaff',
      desc: lv => `${4+lv}개 보조포 · 미사일 · DMG ${6+lv*4} · 폭발 ${50+lv*8}`,
      // 다수의 보조 포탑이 빠른 속도로 폭발 미사일을 쏟아냄.
      init(ab) { ab.angle = 0; ab.cooldowns = []; ab.missiles = []; ab.explosions = []; },
      tick(ab) {
        const count = 4 + ab.level;
        const dmg = 6 + ab.level * 4;
        const explodeR = 50 + ab.level * 8;
        while (ab.cooldowns.length < count) ab.cooldowns.push(0);
        while (ab.cooldowns.length > count) ab.cooldowns.pop();
        ab.angle += 0.005;
        for (const e of ab.explosions) e.life--;
        ab.explosions = ab.explosions.filter(e => e.life > 0);
        const radius = 55;
        // 발사
        for (let i = 0; i < count; i++) {
          if (--ab.cooldowns[i] > 0) continue;
          const a = ab.angle + (Math.PI * 2 / count) * i;
          const tx = CX + Math.cos(a) * radius;
          const ty = CY + Math.sin(a) * radius;
          let target = null, best = Infinity;
          for (const e of state.enemies) {
            if (e.hp <= 0) continue;
            const [ex, ey] = enemyXY(e);
            const d2 = (ex-tx)*(ex-tx) + (ey-ty)*(ey-ty);
            if (d2 < best) { best = d2; target = e; }
          }
          if (target) {
            const [tex, tey] = enemyXY(target);
            const ang = Math.atan2(tey - ty, tex - tx);
            ab.missiles.push({
              x: tx, y: ty,
              vx: Math.cos(ang) * 5, vy: Math.sin(ang) * 5,
              target, life: 180,
            });
            ab.cooldowns[i] = Math.max(18, 40 - ab.level * 2);
          }
        }
        // 미사일 이동
        for (const m of ab.missiles) {
          if (!m.target || m.target.hp <= 0) {
            let best = Infinity, t = null;
            for (const e of state.enemies) {
              if (e.hp <= 0) continue;
              const [ex, ey] = enemyXY(e);
              const d2 = (m.x-ex)*(m.x-ex) + (m.y-ey)*(m.y-ey);
              if (d2 < best) { best = d2; t = e; }
            }
            m.target = t;
          }
          if (m.target) {
            const [tx, ty] = enemyXY(m.target);
            const curAng = Math.atan2(m.vy, m.vx);
            const wantAng = Math.atan2(ty - m.y, tx - m.x);
            let diff = wantAng - curAng;
            while (diff > Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            const turn = 0.2;
            const c = Math.max(-turn, Math.min(turn, diff));
            const a = curAng + c;
            m.vx = Math.cos(a) * 5.5; m.vy = Math.sin(a) * 5.5;
          }
          m.x += m.vx; m.y += m.vy; m.life--;
          for (const e of state.enemies) {
            if (e.hp <= 0) continue;
            const [ex, ey] = enemyXY(e);
            if ((m.x-ex)*(m.x-ex) + (m.y-ey)*(m.y-ey) < (e.size + 3)*(e.size + 3)) {
              for (const e2 of state.enemies) {
                if (e2.hp <= 0) continue;
                const [ex2, ey2] = enemyXY(e2);
                if ((m.x-ex2)*(m.x-ex2) + (m.y-ey2)*(m.y-ey2) < explodeR*explodeR) {
                  damageEnemy(e2, dmg);
                  spawnParticles(ex2, ey2, '#aacaff', 4);
                }
              }
              ab.explosions.push({ x: m.x, y: m.y, r: explodeR, life: 14 });
              m.life = 0;
              break;
            }
          }
          if ((m.x-CX)*(m.x-CX) + (m.y-CY)*(m.y-CY) > (ARENA_R+30)*(ARENA_R+30)) m.life = 0;
        }
        ab.missiles = ab.missiles.filter(m => m.life > 0);
      },
      draw(ab) {
        const count = 4 + ab.level;
        const radius = 55;
        for (let i = 0; i < count; i++) {
          const a = ab.angle + (Math.PI * 2 / count) * i;
          const tx = CX + Math.cos(a) * radius;
          const ty = CY + Math.sin(a) * radius;
          ctx.fillStyle = '#1d2230'; ctx.fillRect(tx - 6, ty - 6, 12, 12);
          ctx.fillStyle = '#aacaff'; ctx.fillRect(tx - 5, ty - 5, 10, 10);
          ctx.fillStyle = '#dde8ff'; ctx.fillRect(tx - 2, ty - 2, 4, 4);
        }
        for (const m of ab.missiles) {
          const ang = Math.atan2(m.vy, m.vx);
          ctx.save();
          ctx.translate(m.x, m.y); ctx.rotate(ang);
          ctx.fillStyle = '#1d2230'; ctx.fillRect(-5, -3, 10, 6);
          ctx.fillStyle = '#aacaff'; ctx.fillRect(-4, -2, 8, 4);
          ctx.fillStyle = '#fff'; ctx.fillRect(-2, -1, 4, 2);
          ctx.fillStyle = 'rgba(170, 202, 255, 0.4)';
          ctx.fillRect(-7, -1, 4, 2);
          ctx.restore();
        }
        // 폭발 이펙트
        for (const e of ab.explosions) {
          const t = 1 - e.life / 14;
          ctx.globalAlpha = e.life / 14;
          ctx.fillStyle = '#aacaff';
          ctx.beginPath(); ctx.arc(e.x, e.y, e.r * t, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = (e.life / 14) * 0.7;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath(); ctx.arc(e.x, e.y, e.r * t * 0.5, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
      },
    },

    frostfireSpear: {
      name: '빙화창', isCombo: true, baseCost: 140, color: '#ff88cc',
      desc: lv => `${2+lv}발 빙화창 · DMG ${6+lv*3} · 슬로우+화상`,
      // 화염+얼음을 같이 두른 창. 관통, 슬로우, 화상 DOT.
      init(ab) { ab.cooldown = 25; ab.lances = []; ab.burns = new Map(); },
      tick(ab) {
        const dmg = 6 + ab.level * 3;
        const slowDur = 90 + ab.level * 15;
        const burnDur = 60;
        const burnDmg = 1 + Math.floor(ab.level / 2);
        for (const [e, info] of ab.burns) {
          if (e.hp <= 0) { ab.burns.delete(e); continue; }
          info.life--; info.tick--;
          if (info.tick <= 0) {
            damageEnemy(e, burnDmg);
            const [ex, ey] = enemyXY(e);
            spawnParticles(ex, ey, '#ff7733', 1);
            info.tick = 12;
          }
          if (info.life <= 0) ab.burns.delete(e);
        }
        for (const l of ab.lances) {
          l.x += l.vx; l.y += l.vy; l.life--;
          for (const e of state.enemies) {
            if (l.hit.has(e) || e.hp <= 0) continue;
            const [ex, ey] = enemyXY(e);
            if ((l.x-ex)*(l.x-ex) + (l.y-ey)*(l.y-ey) < (e.size + 5)*(e.size + 5)) {
              damageEnemy(e, dmg);
              e.slowFrames = Math.max(e.slowFrames || 0, slowDur);
              ab.burns.set(e, { life: burnDur, tick: 12 });
              l.hit.add(e);
              spawnParticles(ex, ey, '#ff88cc', 5);
            }
          }
          if ((l.x-CX)*(l.x-CX) + (l.y-CY)*(l.y-CY) > (ARENA_R+30)*(ARENA_R+30)) l.life = 0;
        }
        ab.lances = ab.lances.filter(l => l.life > 0);
        if (--ab.cooldown > 0) return;
        const target = findNearestEnemy(ARENA_R + 50);
        if (!target) return;
        const [tx, ty] = enemyXY(target);
        const base = Math.atan2(ty - CY, tx - CX);
        const n = 2 + ab.level;
        const spread = Math.min(Math.PI * 0.4, (n - 1) * 0.2);
        for (let i = 0; i < n; i++) {
          const off = n === 1 ? 0 : (-spread/2 + spread * (i/(n-1)));
          const ang = base + off;
          ab.lances.push({
            x: CX, y: CY,
            vx: Math.cos(ang) * 8, vy: Math.sin(ang) * 8,
            ang, life: 95, hit: new Set(),
          });
        }
        ab.cooldown = Math.max(22, 45 - ab.level * 3);
      },
      draw(ab) {
        for (const l of ab.lances) {
          ctx.save();
          ctx.translate(l.x, l.y); ctx.rotate(l.ang);
          ctx.fillStyle = 'rgba(255, 136, 204, 0.35)';
          ctx.fillRect(-18, -5, 36, 10);
          ctx.fillStyle = '#ff7733'; ctx.fillRect(-14, -3, 14, 6);
          ctx.fillStyle = '#aaddff'; ctx.fillRect(0, -3, 14, 6);
          ctx.fillStyle = '#ffffff'; ctx.fillRect(-10, -1, 20, 2);
          ctx.restore();
        }
        for (const [e, info] of ab.burns) {
          if (info.tick > 9 || Math.random() > 0.3) continue;
          const [ex, ey] = enemyXY(e);
          ctx.fillStyle = '#ff7733';
          ctx.fillRect(ex + Math.random() * 8 - 4, ey - 8, 1, 2);
        }
      },
    },

    kamikazeDrone: {
      name: '자폭드론', isCombo: true, baseCost: 150, color: '#cc88ff',
      desc: lv => `${2+lv}개 자폭 드론 · DMG ${8+lv*4} · 폭발 ${60+lv*10}`,
      // 드론이 적을 향해 적극적으로 돌격하여 자폭. 큰 광역 폭발.
      init(ab) { ab.drones = []; ab.spawnCooldown = 0; ab.explosions = []; },
      tick(ab) {
        const dmg = 8 + ab.level * 4;
        const explodeR = 60 + ab.level * 10;
        for (const e of ab.explosions) e.life--;
        ab.explosions = ab.explosions.filter(e => e.life > 0);
        for (const d of ab.drones) {
          if (!d.target || d.target.hp <= 0) {
            let best = Infinity, t = null;
            for (const e of state.enemies) {
              if (e.hp <= 0) continue;
              const [ex, ey] = enemyXY(e);
              const d2 = (d.x-ex)*(d.x-ex) + (d.y-ey)*(d.y-ey);
              if (d2 < best) { best = d2; t = e; }
            }
            d.target = t;
          }
          if (d.target) {
            const [tx, ty] = enemyXY(d.target);
            const dx = tx - d.x, dy = ty - d.y;
            const dist = Math.hypot(dx, dy);
            d.vx = (dx/dist) * 4.8;
            d.vy = (dy/dist) * 4.8;
            if (dist < d.target.size + 8) {
              for (const e2 of state.enemies) {
                if (e2.hp <= 0) continue;
                const [ex2, ey2] = enemyXY(e2);
                if ((d.x-ex2)*(d.x-ex2) + (d.y-ey2)*(d.y-ey2) < explodeR*explodeR) {
                  damageEnemy(e2, dmg);
                  spawnParticles(ex2, ey2, '#cc88ff', 5);
                }
              }
              ab.explosions.push({ x: d.x, y: d.y, r: explodeR, life: 14 });
              d.exploded = true;
            }
          }
          d.x += d.vx; d.y += d.vy;
        }
        ab.drones = ab.drones.filter(d => !d.exploded);
        const want = 2 + ab.level;
        if (ab.drones.length < want) {
          ab.spawnCooldown--;
          if (ab.spawnCooldown <= 0) {
            const a = Math.random() * Math.PI * 2;
            ab.drones.push({
              x: CX + Math.cos(a) * 30, y: CY + Math.sin(a) * 30,
              vx: 0, vy: 0, target: null,
            });
            ab.spawnCooldown = Math.max(25, 70 - ab.level * 4);
          }
        }
      },
      draw(ab) {
        for (const d of ab.drones) {
          const ang = Math.atan2(d.vy, d.vx);
          ctx.save();
          ctx.translate(d.x, d.y); ctx.rotate(ang);
          ctx.fillStyle = '#1d2230'; ctx.fillRect(-7, -4, 14, 8);
          ctx.fillStyle = '#cc88ff'; ctx.fillRect(-6, -3, 12, 6);
          const pulse = 0.5 + 0.5 * Math.sin(state.t * 0.35);
          ctx.fillStyle = `rgba(255, 80, 80, ${pulse})`;
          ctx.fillRect(-1, -1, 2, 2);
          ctx.restore();
        }
        for (const e of ab.explosions) {
          const t = 1 - e.life / 14;
          ctx.globalAlpha = e.life / 14;
          ctx.fillStyle = '#cc88ff';
          ctx.beginPath(); ctx.arc(e.x, e.y, e.r * t, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = (e.life / 14) * 0.7;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath(); ctx.arc(e.x, e.y, e.r * t * 0.5, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
      },
    },

    cosmicCollapse: {
      name: '천체붕괴', isCombo: true, baseCost: 200, color: '#9933cc',
      desc: lv => `중력장 → 운석 강타 · DMG ${20+lv*10} · 반경 ${120+lv*15}`,
      // 1.5초 동안 블랙홀이 적을 빨아들인 뒤 거대 운석이 떨어져 폭발.
      init(ab) { ab.cooldown = 240; ab.events = []; },
      tick(ab) {
        const dmg = 20 + ab.level * 10;
        const radius = 120 + ab.level * 15;
        const pullR = 150 + ab.level * 10;
        for (const ev of ab.events) {
          ev.t++;
          if (ev.t <= 90) {
            for (const e of state.enemies) {
              if (e.hp <= 0) continue;
              const [ex, ey] = enemyXY(e);
              const dx = ev.x - ex, dy = ev.y - ey;
              const dist = Math.hypot(dx, dy);
              if (dist < pullR && dist > 5) {
                const pullSpeed = (1 - dist / pullR) * 3.5;
                const newEx = ex + (dx/dist) * pullSpeed;
                const newEy = ey + (dy/dist) * pullSpeed;
                e.angle = Math.atan2(newEy - CY, newEx - CX);
                e.radius = Math.hypot(newEx - CX, newEy - CY);
                e.targetRadius = e.radius;
              }
            }
          }
          if (ev.t === 90) {
            for (const e of state.enemies) {
              if (e.hp <= 0) continue;
              const [ex, ey] = enemyXY(e);
              if ((ev.x-ex)*(ev.x-ex) + (ev.y-ey)*(ev.y-ey) < radius*radius) {
                damageEnemy(e, dmg);
                spawnParticles(ex, ey, '#9933cc', 8);
              }
            }
          }
        }
        ab.events = ab.events.filter(e => e.t < 130);
        if (--ab.cooldown > 0) return;
        let bestX = CX, bestY = CY;
        let highEnemy = null, highBest = -1;
        for (const e of state.enemies) {
          if (e.hp > highBest) { highBest = e.hp; highEnemy = e; }
        }
        if (highEnemy) { const [hx, hy] = enemyXY(highEnemy); bestX = hx; bestY = hy; }
        ab.events.push({ x: bestX, y: bestY, t: 0 });
        ab.cooldown = Math.max(150, 280 - ab.level * 10);
      },
      draw(ab) {
        for (const ev of ab.events) {
          const pullR = 150 + ab.level * 10;
          const radius = 120 + ab.level * 15;
          if (ev.t < 90) {
            const progress = ev.t / 90;
            ctx.strokeStyle = `rgba(153, 51, 204, ${0.15 + progress * 0.2})`;
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(ev.x, ev.y, pullR, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(ev.x, ev.y, 8 + progress * 8, 0, Math.PI*2); ctx.fill();
            for (let k = 0; k < 8; k++) {
              const pa = state.t * 0.15 + k * (Math.PI * 2 / 8);
              const pr = 16 + progress * 10;
              ctx.fillStyle = '#9933cc';
              ctx.fillRect(ev.x + Math.cos(pa) * pr - 1, ev.y + Math.sin(pa) * pr - 1, 2, 2);
            }
            if (ev.t > 60) {
              const fp = (ev.t - 60) / 30;
              const my = ev.y - (1 - fp) * 250;
              const ms = 14 + fp * 10;
              ctx.fillStyle = '#dd6633'; ctx.fillRect(ev.x - ms, my - ms, ms*2, ms*2);
              ctx.fillStyle = '#ffaa66'; ctx.fillRect(ev.x - ms/2, my - ms/2, ms, ms);
              ctx.globalAlpha = 0.5;
              ctx.fillStyle = '#ffaa66'; ctx.fillRect(ev.x - 4, my - 40, 8, 35);
              ctx.globalAlpha = 1;
            }
          } else {
            const tt = (ev.t - 90) / 40;
            ctx.globalAlpha = 1 - tt;
            ctx.fillStyle = '#9933cc';
            ctx.beginPath(); ctx.arc(ev.x, ev.y, radius * tt, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = (1 - tt) * 0.7;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(ev.x, ev.y, radius * tt * 0.5, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
          }
        }
      },
    },

    // ========== 트리플 조합 (히든) — 조합 능력 + 기본 능력이 만나면 형성 ==========
    ultraGatling: {
      name: '초연사총', isCombo: true, isTriple: true, baseCost: 200, color: '#ddeeff',
      desc: lv => `360도 ${10+lv*2}발 유도 미니건 · DMG ${4+lv*2}`,
      // 정밀연사 + 산탄 = 모든 방향으로 유도 미니건 사출

          const ang = (Math.PI * 2 / n) * i + off;
          const b = fireBullet(ang, 4 + ab.level * 2, '#ddeeff', nearest);
          b.size = 3; b.glow = true;
        }
        ab.cooldown = Math.max(20, 40 - ab.level * 2);

    absoluteThunder: {
      name: '절대빙뢰', isCombo: true, isTriple: true, baseCost: 220, color: '#ccddff',
      desc: lv => `${3+lv}곳 낙뢰 + ${4+lv}회 연쇄 · DMG ${10+lv*5} · 슬로우`,
      // 연쇄낙뢰 + 빙결 = 낙뢰 후 광역 슬로우
      init(ab) { ab.cooldown = 60; ab.bolts = []; ab.chains = []; },
      tick(ab) {
        for (const b of ab.bolts) b.life--;
        ab.bolts = ab.bolts.filter(b => b.life > 0);
        for (const c of ab.chains) c.life--;
        ab.chains = ab.chains.filter(c => c.life > 0);
        if (--ab.cooldown > 0) return;
        const strikes = 3 + ab.level;
        const chainCount = 4 + ab.level;
        const dmg = 10 + ab.level * 5;
        const slowDur = 120 + ab.level * 20;
        const pool = state.enemies.filter(e => e.hp > 0);
        for (let i = 0; i < strikes && pool.length > 0; i++) {
          const idx = Math.floor(Math.random() * pool.length);
          const target = pool.splice(idx, 1)[0];
          const [tx, ty] = enemyXY(target);
          damageEnemy(target, dmg);

  const ALL_ABILITY_IDS = Object.keys(ABILITY_DEFS);
  const BASIC_ABILITY_IDS = ALL_ABILITY_IDS.filter(id => !ABILITY_DEFS[id].isCombo);

  // ===== 조합 레시피 =====
  // 두 기본 능력을 동시에 보유하면 자동으로 조합 능력으로 합쳐짐.
  const COMBO_RECIPES = [

    // ===== 액티브 2-콤보 (기본) =====
    { parts: ['scatter',   'mortar'],    combo: 'shotgunBurst' },
    { parts: ['shot',      'multi'],     combo: 'precisionBurst' },
    { parts: ['chain',     'thunder'],   combo: 'chainStorm' },
    { parts: ['nova',      'frost'],     combo: 'frostNova' },
    { parts: ['laser',     'beam'],      combo: 'twinBeam' },

    { parts: ['fire',      'iceLance'],  combo: 'frostfireSpear' },

    { parts: ['shot',      'sniper'],    combo: 'headshot' },
    { parts: ['multi',     'scatter'],   combo: 'pelletGun' },

  // 다중 파트너 인덱스 — 한 능력이 여러 조합에 참여 가능
  const COMBO_PARTNERS = {};
  for (const r of COMBO_RECIPES) {
    for (let i = 0; i < r.parts.length; i++) {
      const me = r.parts[i];
      const other = r.parts[1 - i];
      if (!COMBO_PARTNERS[me]) COMBO_PARTNERS[me] = [];
      COMBO_PARTNERS[me].push({ partner: other, combo: r.combo, tier: r.tier || 2 });
    }
  }
  // 기존 단일 파트너 인덱스 (역호환) — 첫 번째 항목 사용
  const COMBO_PARTNER = {};
  for (const id in COMBO_PARTNERS) {
    COMBO_PARTNER[id] = COMBO_PARTNERS[id][0];

  // 조합 자동 형성은 제거됨 (뱀파이어 서바이버즈 스타일)
  // 이제 조합은 두 재료가 모두 max 도달 시 다음 카드 모달에 '조합' 옵션으로 등장하며,
  // 플레이어가 그 카드를 선택할 때만 형성됨. (applyLevelUpChoice의 'combo' 액션 참고)
  function checkCombos() { return false; }

  // ===== 라운드 설정 =====
  // 일반: 30초간 1초에 1마리씩 (총 20마리). 다 잡으면 즉시 다음 라운드 + 보너스 점수.
  // 5라운드마다 보스 라운드: 잡몹 절반 + 보스 1마리.
  // 100라운드: 5라운드분 시간(150초) + 보스 3마리 + 잡몹 다수 (최종전).
  const MAX_ROUND = 100;
  function enemyHpFor(n) {
    // R1~25 지수 성장, R26+ 선형(완만화) — R100도 도전 가능하게
    if (n <= 25) return Math.ceil(3 * Math.pow(1.35, n - 1));
    const base = Math.ceil(3 * Math.pow(1.35, 24));
    return Math.ceil(base * (1 + (n - 25) * 0.18));
  }
  function roundConfig(n) {
    const hp = enemyHpFor(n);
    const isFinal = n === MAX_ROUND;
    const isBoss  = n > 0 && n % 5 === 0 && !isFinal;
    return {
      duration:      (isFinal ? 150 : 30) * FPS,
      spawnCount:    isFinal ? 50 : (isBoss ? 10 : 20),
      spawnInterval: isFinal ? 3 * FPS : (isBoss ? 2 * FPS : 1 * FPS),
      enemyHp:       hp,
      enemySpeed:    0.008 + (n - 1) * 0.0005,
      enemyGold:     Math.max(1, Math.ceil(hp / 3)),
      isBoss, isFinal,
      bossHp:        Math.ceil(hp * (isFinal ? 22 : 12)),
      bossGold:      Math.ceil(hp * (isFinal ? 10 : 4)),
    };
  }

  // ===== 게임 상태 =====
  let state, paused;
  function reset() {
    state = {
      tower: {
        abilities: [],     // [{id, level, cooldown, ...각 능력별 상태}]
        acquireCount: 0,   // 랜덤 능력 획득 누적 횟수 (비용 계산용)
      },
      enemies: [],
      bullets: [],
      particles: [],
      damageNumbers: [],   // 데미지 숫자 부유 효과
      comboFlash: 0,
      comboFlashColor: '#ffaa55',
      comboReveal: null,   // 콤보 형성 시 큰 카드
      shakeFrames: 0,      // 화면 흔들림 잔여 프레임
      shakeStrength: 0,
      kills: 0,            // 현재 레벨 진행도 처치 수
      totalKills: 0,       // 게임 전체 누적 처치 (업적용)
      playerLevel: 1,
      killsToNextLevel: 8,
      levelUpChoices: null, // 레벨업 선택 카드들 (활성 시 모달)
      round: 1,
      roundFrame: 0,        // 현재 라운드 경과 프레임
      spawnPlan: [],        // 이번 라운드에 남은 스폰 시점
      gold: 0,
      score: 0,
      gameOver: false,
      gameOverReason: '',
      gameWin: false,
      t: 0,
    };
    // 메타 강화 + 캐릭터 패시브 적용 (캐릭터는 골드/점수에는 영향 없음)
    const mods = getMetaMods();
    const char = CHARACTERS[selectedCharacter] || CHARACTERS.standard;
    const cp = char.passive;
    state.gold = mods.startGold;
    state.metaMods = {
      goldMul:    mods.goldMul,
      scoreMul:   mods.scoreMul,
      enhanceMul: mods.enhanceMul * (cp.enhanceMul || 1),
      bossDmgMul: mods.bossDmgMul * (cp.bossDmgMul || 1),
      dmgMul:     cp.dmgMul || 1,
      dmgBoost:   mods.dmgBoost || 0,
      bossGoldMul: mods.bossGoldMul || 0,
      slowMul:    cp.slowMul || 1,
      levelUpMul: cp.levelUpMul || 1,
      levelUpFast: mods.levelUpFast || 0,
      slotMod:    cp.slotMod || 0,
      freeRolls:  mods.freeRolls,
    };
    // 메타 강화: 시작 점수
    if (mods.startScore) state.score = mods.startScore;
    state.character = selectedCharacter;
    // 캐릭터 시작 능력 부여
    for (const id of char.startAbilities) {
      const ab = { id, level: 1 };
      ABILITY_DEFS[id].init(ab);
      state.tower.abilities.push(ab);
      unlockAbility(id);
    }
    checkCombos();
    planRound();
    paused = false;
    // 시작 무료 레벨업 (메타 보너스)
    for (let i = 0; i < state.metaMods.freeRolls; i++) {
      const choices = generateLevelUpChoices();
      if (choices.length === 0) break;
      const c = choices[0];
      if (c.action === 'new') {
        const ab = { id: c.id, level: 1 };
        ABILITY_DEFS[c.id].init(ab);
        state.tower.abilities.push(ab);
        unlockAbility(c.id);
        checkCombos();
      }
    }
  }

  // 라운드 진행 — 100라운드 이상이면 승리
  function advanceRound() {
    state.round++;
    if (state.round > MAX_ROUND) {
      endGame('🏆 100라운드 클리어!', true);
    } else {
      planRound();
    }
  }
  function endGame(reason, win) {
    if (state.gameOver) return;
    state.gameOver = true;
    state.gameOverReason = reason;

  function checkAchievements() {
    const have = getUnlockedAchievements();
    let earned = 0, newOnes = [];
    // 단발 업적 — 한 번만 획득
    for (const ach of ACHIEVEMENTS) {
      if (have.has(ach.id)) continue;
      if (ach.check(state)) {
        have.add(ach.id);
        earned += ach.reward;
        newOnes.push(ach);
      }
    }
    // 반복 업적 — 매 게임마다 조건 충족 시 보상
    let repeatEarned = 0;
    const repeatHits = [];
    META.repeatCounts = META.repeatCounts || {};
    for (const ach of REPEAT_ACHIEVEMENTS) {
      if (ach.check(state)) {
        META.repeatCounts[ach.id] = (META.repeatCounts[ach.id] || 0) + 1;
        repeatEarned += ach.reward;
        repeatHits.push(ach);
      }
    }
    if (newOnes.length > 0 || repeatEarned > 0) {
      META.achievements = [...have];
      META.stardust = (META.stardust || 0) + earned + repeatEarned;
      saveMeta();
      state.achievementsEarned = newOnes;

    const lockedByAchievement = new Set();
    for (const ach of ACHIEVEMENTS) {
      if (ach.unlocks && ach.unlocks.ability) {
        lockedByAchievement.add(ach.unlocks.ability);
      }
    }
    const have = getUnlockedAchievements();
    for (const id of BASIC_ABILITY_IDS) {
      if (!lockedByAchievement.has(id)) { set.add(id); continue; }
      // 잠긴 능력은 그 업적 보유 시에만 해금
      for (const ach of ACHIEVEMENTS) {
